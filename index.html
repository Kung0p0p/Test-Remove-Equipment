                                <button onClick={addEquip} className="text-[10px] bg-slate-800 hover:bg-slate-700 text-white px-2 py-1 rounded shadow-sm transition-colors"><i className="fa-solid fa-plus"></i> เพิ่มอุปกรณ์</button>
                            </div>
                            <div className="space-y-1.5 max-h-[30vh] overflow-y-auto custom-scrollbar pr-2 pb-1">
                                {equipments.map((eq, i) => (
                                    <div key={i} className="flex gap-2 items-center bg-white p-1.5 rounded border border-slate-200 shadow-sm hover:border-blue-300 transition-colors">
                                        <div className="w-6 text-center text-xs font-bold text-slate-300">{i+1}.</div>
                                        <input type="text" placeholder="ชื่ออุปกรณ์" value={eq.name} onChange={e=>{let ne=[...equipments]; ne[i].name=e.target.value; setEquipments(ne);}} className="flex-1 px-2 py-1 border-b border-transparent hover:border-slate-200 focus:border-blue-400 text-xs outline-none font-semibold" />
                                        <div className="w-px h-4 bg-slate-200"></div>
                                        <input type="text" placeholder="Serial Number" value={eq.serial} onChange={e=>{let ne=[...equipments]; ne[i].serial=e.target.value; setEquipments(ne);}} className="flex-1 px-2 py-1 border-b border-transparent hover:border-slate-200 focus:border-blue-400 text-xs outline-none text-indigo-700" />
                                        {equipments.length > 1 && <button onClick={()=>rmEquip(i)} className="text-slate-300 hover:text-red-500 px-1 transition-colors"><i className="fa-solid fa-circle-xmark"></i></button>}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="w-full lg:w-[350px] flex flex-col shrink-0">
                        <div className="flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col overflow-hidden">
                            <div className="bg-slate-800 text-white p-2.5 font-bold text-center flex justify-between items-center text-sm">
                                <span><i className="fa-brands fa-line text-green-400 mr-1 text-base"></i> Line Preview</span>
                            </div>
                            <div className="flex-1 line-preview p-3 overflow-y-auto custom-scrollbar flex flex-col">
                                <div className="line-bubble p-3 text-xs text-slate-800 whitespace-pre-wrap font-sans leading-relaxed">
                                    {generateMessage()}

                            </div>
                            <div className="p-3 bg-white border-t border-slate-200">
                                <button onClick={submitJob} disabled={isSending} className={`w-full ${isSending ? 'bg-slate-400' : 'bg-[#06C755] hover:bg-[#05b34c]'} text-white font-bold py-2.5 rounded-lg shadow-sm transition-transform active:scale-95 flex items-center justify-center gap-2 text-sm`}>
                                    <i className="fa-solid fa-paper-plane"></i> จ่ายงาน & ส่ง Line
                                </button>
                                <button onClick={handleCopy} className="w-full mt-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-1.5 rounded-lg text-xs transition-colors">
                                    <i className="fa-regular fa-copy"></i> คัดลอก
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 3. MAIN APP COMPONENT
        // ==========================================
        function App() {
          const [activeTab, setActiveTab] = useState('dashboard');
          const [tasks, setTasks] = useState([]);
          const [nsTasks, setNsTasks] = useState([]); 
          const [isLoading, setIsLoading] = useState(true);
          const [firebaseError, setFirebaseError] = useState(null); 
          const [isSidebarOpen, setIsSidebarOpen] = useState(window.innerWidth > 1024);
          
          const [columns, setColumns] = useState([]);
          const [nsColumns, setNsColumns] = useState([]); 
          const [hiddenColumns, setHiddenColumns] = useState([]); 
          const [pinnedColumns, setPinnedColumns] = useState([]); 
          
          const [currentDate, setCurrentDate] = useState(new Date());
          const [calendarView, setCalendarView] = useState('month');
          const [dashboardView, setDashboardView] = useState('subcontract'); 
          const [dashboardYear, setDashboardYear] = useState('overview'); 
          const [tasksSubTab, setTasksSubTab] = useState('subcontract'); 

          const [visibleRows, setVisibleRows] = useState(100); // ใช้ตัวนี้จัดการ Infinite Scroll ทั้งสองหน้า

          const [filterMonth, setFilterMonth] = useState('All');
          const [filterTeams, setFilterTeams] = useState([]);
          const [selectedStatuses, setSelectedStatuses] = useState([]);
          const [tableFilterTeams, setTableFilterTeams] = useState([]); 
          const [tableFilterCID, setTableFilterCID] = useState('All');
          const [tableFilterDate, setTableFilterDate] = useState([]);
          const [tableFilterYear, setTableFilterYear] = useState([]);
          const [tableFilterStatus, setTableFilterStatus] = useState([]);
          const [tableFilterOverdue, setTableFilterOverdue] = useState([]);
          const [searchTerm, setSearchTerm] = useState('');
          const [calendarFilterTeams, setCalendarFilterTeams] = useState([]); // 🔥 ฟิลเตอร์ทีมในปฏิทิน
          const [tableFilterRegionRespon, setTableFilterRegionRespon] = useState([]); // 🔥 เพิ่มตัวกรอง Region Respon

          const [tooltipData, setTooltipData] = useState({ visible: false, task: null, x: 0, y: 0 });
          const [colWidths, setColWidths] = useState({}); 
          const [rowHeights, setRowHeights] = useState({}); // 🔥 State สำหรับเก็บความสูงของแถว
          const [sortConfig, setSortConfig] = useState({ key: null, direction: null });
          const [editingCell, setEditingCell] = useState(null);

          const [historyLogs, setHistoryLogs] = useState([]);
          const [showHistoryModal, setShowHistoryModal] = useState(false);
          const [masterData, setMasterData] = useState(defaultMasterData);
          const [queueState, setQueueState] = useState({});
          
          // 🔥 ระบบเช็คสิทธิ์ Admin (เริ่มต้นเป็น false)
          const [isAdmin, setIsAdmin] = useState(false);

          // เช็คจาก URL ตอนโหลดหน้าเว็บ (เช่น ?key=1234)
          useEffect(() => {
              const urlParams = new URLSearchParams(window.location.search);
              if (urlParams.get('key') === 'admin') { // เปลี่ยนเลข 9999 เป็นรหัสที่คุณต้องการ
                  setIsAdmin(true);
              }
          }, []);
          
          const [isBackgroundSyncing, setIsBackgroundSyncing] = useState(false);
          const [isPendingTransition, startTransition] = useTransition();

          const [autoAssignData, setAutoAssignData] = useState(null);
          const [showDuplicatesOnly, setShowDuplicatesOnly] = useState(false);

          const pendingUpdatesRef = useRef([]);
          const syncTimerRef = useRef(null);

          // 🔥 Custom Alerts & Confirms State
          const [appAlert, setAppAlert] = useState({ show: false, message: '', type: 'success' });
          const [appConfirm, setAppConfirm] = useState({ show: false, message: '', onConfirm: null });

          const customAlert = (message, type = 'success') => {
              setAppAlert({ show: true, message, type });
              setTimeout(() => setAppAlert({ show: false, message: '', type: 'success' }), 3500);
          };

          const customConfirm = (message, onConfirmCallback) => {
              setAppConfirm({ show: true, message, onConfirm: onConfirmCallback });
          };

          // ================== VARIABLES DEFINITIONS ==================
          const getStatusColumnName = (cols) => {
              if (!cols) return '';
              let exact = cols.find(c => {
                  const lc = c ? String(c).toLowerCase().replace(/[\s_]+/g, '') : '';
                  return lc === 'status' || lc === 'สถานะ' || lc === 'statusjob' || lc === 'jobstatus';
              });
              if (exact) return exact;
              let partial = cols.find(c => {
                  const lc = c ? String(c).toLowerCase().replace(/[\s_]+/g, '') : '';
                  return (lc.includes('status') || lc.includes('สถานะ')) && !lc.includes('change') && !lc.includes('เปลี่ยน') && !lc.includes('date') && !lc.includes('วันที่') && !lc.includes('time') && !lc.includes('เวลา');
              });
              if (partial) return partial;
              return cols[cols.length - 1] || '';
          };

          const getTeamColumnName = (cols) => {
              if (!cols) return '';
              let exact = cols.find(c => {
                  const lc = c ? String(c).toLowerCase().replace(/[\s_]+/g, '') : '';
                  return lc === 'ทีมงาน' || lc === 'team' || lc === 'nsresponsible' || lc === 'subcontract' || lc === 'ผู้รับผิดชอบ';
              });
              if (exact) return exact;
              let partial = cols.find(c => {
                  const lc = c ? String(c).toLowerCase().replace(/[\s_]+/g, '') : '';
                  return (lc.includes('ทีม') || lc.includes('responsible') || lc.includes('รับผิดชอบ')) && !lc.includes('วันที่') && !lc.includes('date') && !lc.includes('time');
              });
              if (partial) return partial;
              return cols.length > 1 ? cols[1] : '';
          };

          let currentColumnsTable = tasksSubTab === 'subcontract' ? [...columns] : [...nsColumns];
          const currentTasksTable = tasksSubTab === 'subcontract' ? tasks : nsTasks;
          
          // 🟢 เพิ่มคอลัมน์จำลอง Region_Respon ในหน้า Subcontract
          if (tasksSubTab === 'subcontract' && currentColumnsTable.length > 0 && !currentColumnsTable.includes('Region_Respon')) {
              currentColumnsTable.push('Region_Respon');
          }

          // 🟢 ซ่อนคอลัมน์ "ประทับเวลา" อัตโนมัติในครั้งแรกที่โหลด
          const [hasAutoHidden, setHasAutoHidden] = useState(false);
          useEffect(() => {
              if (columns.length > 0 && !hasAutoHidden) {
                  const tsCol = columns.find(c => (c && String(c).toLowerCase().includes('ประทับเวลา')) || (c && String(c).toLowerCase().includes('timestamp')));
                  if (tsCol && !hiddenColumns.includes(tsCol)) {
                      setHiddenColumns(prev => [...prev, tsCol]);
                  }
                  setHasAutoHidden(true);
              }
          }, [columns, hasAutoHidden, hiddenColumns]);
          
          const visibleColumnsTable = (currentColumnsTable || []).filter(col => !(hiddenColumns || []).includes(col));
          const pinnedColsListTable = visibleColumnsTable.filter(c => (pinnedColumns || []).includes(c));
          const unpinnedColsListTable = visibleColumnsTable.filter(c => !(pinnedColumns || []).includes(c));
          const orderedVisibleColumnsTable = [...pinnedColsListTable, ...unpinnedColsListTable];

          const t_getCol = (keywords) => (currentColumnsTable || []).find(c => keywords.some(kw => c ? String(c).toLowerCase().replace(/[\s_]+/g,'').includes(kw.toLowerCase().replace(/[\s_]+/g,'')) : false)) || '';
          
          const t_statusCol = getStatusColumnName(currentColumnsTable);
          const t_teamCol = getTeamColumnName(currentColumnsTable);
          
          const t_cidCol = t_getCol(['cid', 'circuitno']) || '';
          const t_equipYearCol = t_getCol(['year', 'ปี']) || '';
          const t_overDueCol = (currentColumnsTable || []).find(c => { const lc = c ? String(c).toLowerCase().replace(/[\s_]+/g, '') : ''; return lc.includes('นัดหมายลูกค้า') || lc.includes('over3') || lc.includes('เกินกำหนด'); }) || '';
          const t_collectionDateCol = (currentColumnsTable || []).find(c => c ? String(c).replace(/[\s_]+/g, '').includes('วันที่เข้าเก็บ') : false) || t_getCol(['วันที่', 'date']) || currentColumnsTable?.[0] || '';
          
          const statusChangeColMatch = (currentColumnsTable || []).find(c => { const lc = c ? String(c).toLowerCase() : ''; return lc === 'status_change' || lc === 'status change' || lc === 'status-change'; }) || '';
          
          // 🟢 ปรับให้ครอบคลุมคอลัมน์ Customer_Contract
          const contactJobColMatch = (currentColumnsTable || []).find(c => {
              const lc = c ? String(c).toLowerCase() : '';
              return lc.includes('customer contact') || lc.includes('customer_contact') || lc === 'contact';
          }) || '';
          
          const itemColMatch = t_getCol(['itemname', 'อุปกรณ์']);
          const snColMatch = t_getCol(['serialno', 'serial', 'sn']);
          const siteTypeColMatch = t_getCol(['sitetype', 'site']);
          const noteCol = (currentColumnsTable || []).find(c => { const lc = c ? String(c).toLowerCase() : ''; return lc.includes('หมายเหตุ') || lc.includes('note'); }) || '';

          const skipColsInTooltip = [ t_teamCol, t_cidCol, t_equipYearCol, t_statusCol, t_overDueCol, t_collectionDateCol, ...(currentColumnsTable || []).filter(c => { const lc = c ? String(c).toLowerCase().replace(/[\s_]+/g, '') : ''; return lc.includes('แจ้งsub') || lc.includes('วันที่แจ้ง') || lc.includes('วันที่ลงข้อมูล') || lc.includes('วันที่รับงาน') || lc.includes('ประทับเวลา') || lc.includes('timestamp') || lc.includes('เวลาแจ้ง') || lc.includes('อีเมล') || lc.includes('email') || lc.includes('mail') || lc.includes('year') || lc.includes('ปี') || lc.includes('นัดหมายลูกค้า') || lc.includes('over3') || lc.includes('เกินกำหนด') || lc.includes('วันที่โทร') || lc.includes('โทรติดต่อ'); }) ].filter(Boolean);

          const tableUniqueTeams = t_teamCol ? [...new Set((currentTasksTable || []).map(t => getCleanTeam(t[t_teamCol])))].sort() : [];
          const tableUniqueStatuses = t_statusCol ? [...new Set((currentTasksTable || []).map(t => getCleanStatus(t[t_statusCol])))].sort() : [];

              } catch (error) {

              if (!isBackground) setIsLoading(false);
              setIsBackgroundSyncing(false);
          };

          useEffect(() => {
              // 1. โหลดข้อมูลจาก Cache ขึ้นมาโชว์ก่อนทันที

          }, [showHistoryModal]);

          // ================== CORE HELPERS ==================

          const navigateCalendar = (dir) => { 
              const nd = new Date(currentDate);

          const handlePointerDown = (e, col) => {
              e.preventDefault(); e.stopPropagation(); 
              const startX = e.pageX || (e.touches ? e.touches[0].pageX : 0); 
              const th = e.currentTarget.closest('th');
              const startWidth = th ? th.getBoundingClientRect().width : 150;
              
              const onPointerMove = (me) => {
                  const currentX = me.pageX || (me.touches ? me.touches[0].pageX : 0);
                  setColWidths(prev => ({ ...prev, [col]: Math.max(50, startWidth + (currentX - startX)) }));
              };
              const onPointerUp = () => { 
                  document.removeEventListener('pointermove', onPointerMove); 
                  document.removeEventListener('pointerup', onPointerUp); 
                  document.removeEventListener('touchmove', onPointerMove); 
                  document.removeEventListener('touchend', onPointerUp); 
              };
              
              document.addEventListener('pointermove', onPointerMove); 
              document.addEventListener('pointerup', onPointerUp);
              document.addEventListener('touchmove', onPointerMove, { passive: false });

          };// 🔥 ฟังก์ชันใหม่สำหรับลากขยายความสูงของแถว (วางต่อท้ายได้เลย)

              const onPointerUp = () => {

                  document.removeEventListener('pointerup', onPointerUp); 
                  document.removeEventListener('touchmove', onPointerMove); 
                  document.removeEventListener('touchend', onPointerUp); 
              };
              
              document.addEventListener('pointermove', onPointerMove); 
              document.addEventListener('pointerup', onPointerUp);

          useEffect(() => {

          const handleSort = (key) => setSortConfig({ key, direction: sortConfig.key === key && sortConfig.direction === 'asc' ? 'desc' : 'asc' });

          const resetFilters = () => {

              setTableFilterDate([]); setTableFilterYear([]); setTableFilterStatus([]);

              setVisibleRows(100);
              setShowDuplicatesOnly(false);
          };

          const handleDeleteTask = (taskObj) => {
              const docIds = taskObj._groupDocs || [taskObj.id];
              const rowIndices = taskObj._groupRows || [taskObj._rowIndex];

              customConfirm(`ยืนยันการลบข้อมูลจำนวน ${docIds.length} แถว ใช่หรือไม่?\n(ข้อมูลจะถูกลบออกจากระบบและ Google Sheet อย่างถาวร)`, async () => {
                  const targetSheetName = tasksSubTab === 'subcontract' ? 'Subcontract_2026' : 'Jobs for NS 2018-2025';

                  if (tasksSubTab === 'subcontract') {
                      setTasks(prev => prev.filter(t => !docIds.includes(t.id)));
                  } else {
                      setNsTasks(prev => prev.filter(t => !docIds.includes(t.id)));
                  }

                  try {
                      if (GAS_WEB_APP_URL) {
                          const payloadData = JSON.stringify({

                          });

                          fetch(GAS_WEB_APP_URL, {
                              method: 'POST',
                              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                              body: payloadData
                          }).catch(e => console.error("Failed to delete from sheet:", e));
                      }

                      customAlert('ลบข้อมูลสำเร็จ', 'success');
                  } catch (error) {

                      customAlert('เกิดข้อผิดพลาดในการลบข้อมูล', 'error');
                  }
              });
          };

          const handleCellDoubleClick = (e, cellId) => {
              setEditingCell(cellId); const el = e.target;
              setTimeout(() => {
                  el.focus();
                  if (typeof window.getSelection !== "undefined" && typeof document.createRange !== "undefined") {
                      const range = document.createRange(); range.selectNodeContents(el); range.collapse(false);
                      const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
                  }
              }, 10);
          };

          const handleMouseMove = (e, task) => {
              const tooltipWidth = 340, tooltipHeight = Math.min(400, window.innerHeight - 40); 
              let x = e.clientX + 20, y = e.clientY + 20;
              
              // ปรับตำแหน่งไม่ให้ล้นจอ
              if (x + tooltipWidth > window.innerWidth) x = e.clientX - tooltipWidth - 20;
              if (y + tooltipHeight > window.innerHeight) y = e.clientY - tooltipHeight - 20;
              
              // ดึงข้อมูลจาก task ต้นฉบับใน tasks state เพื่อให้ได้ข้อมูลครบทุกคอลัมน์
              const fullTaskData = tasks.find(t => t.id === task.id) || task;
              
              setTooltipData({ visible: true, task: fullTaskData, x: Math.max(10, x), y: Math.max(10, y) });
          };
          
          const handleMouseLeave = () => setTooltipData({ visible: false, task: null, x: 0, y: 0 });

          // 🔥 ฟังก์ชันอัปเดตแผ่นงาน
          const handleCellChangeTable = async (taskObj, field, value, currentColumnsTableLocal) => {
              const docIds = taskObj._groupDocs || [taskObj.id];
              const rowIndices = taskObj._groupRows || [taskObj._rowIndex];
              
              const t_getColLocal = (keywords) => (currentColumnsTableLocal || []).find(c => keywords.some(kw => c ? String(c).toLowerCase().replace(/[\s_]+/g,'').includes(kw.toLowerCase().replace(/[\s_]+/g,'')) : false)) || '';
              const itemColMatchLocal = t_getColLocal(['itemname', 'อุปกรณ์']);
              const snColMatchLocal = t_getColLocal(['serialno', 'serial', 'sn']);
              
              if (docIds.length > 1 && (field === itemColMatchLocal || field === snColMatchLocal)) {
                  customAlert('ไม่สามารถแก้ไขข้อมูลอุปกรณ์/ซีเรียล ที่ถูกจัดกลุ่มรวมกันได้ กรุณาแก้ไขแยกทีละบรรทัดใน Google Sheet แทนครับ', 'error');
                  return false; 
              }

              const oldValue = taskObj[field] || '';
              if(oldValue === value) return true;

              if (docIds.length > 20) {
                  customAlert(`⚠️ ระบบระงับการทำงานชั่วคราว! ตรวจพบความพยายามอัปเดตข้อมูลพร้อมกันถึง ${docIds.length} แถว คำแนะนำ: กรุณาลบแถวว่างใน Google Sheet ทิ้งก่อนครับ`, 'error');
                  return false; 
              }

              const targetSheetName = tasksSubTab === 'subcontract' ? 'Subcontract_2026' : 'Jobs for NS 2018-2025';

              if (tasksSubTab === 'subcontract') {
                  setTasks(prev => prev.map(t => docIds.includes(t.id) ? { ...t, [field]: value } : t));
              } else {
                  setNsTasks(prev => prev.map(t => docIds.includes(t.id) ? { ...t, [field]: value } : t));
              }

              try {
                  const cCompCol = (currentColumnsTableLocal || []).find(c => ['บริษัท', 'ลูกค้า', 'site', 'องค์กร', 'ชื่อ', 'company'].some(kw => c ? String(c).toLowerCase().replace(/[\s_]+/g,'').includes(kw) : false)) || '';
                  historyRef.add({ taskId: docIds[0], company: taskObj[cCompCol] || 'Unknown', field: field, oldValue: oldValue || '', newValue: value, updatedAt: firebase.firestore.FieldValue.serverTimestamp(), groupSize: docIds.length }).catch(()=>{});
              } catch (err) {}

              try {
                  if (GAS_WEB_APP_URL) {
                      let hasValidUpdate = false;

                      docIds.forEach((id, idx) => {
                          let rNum = rowIndices[idx];
                          if (!rNum || rNum === 999999 || rNum === 0 || isNaN(parseInt(rNum))) {
                             const parsedId = String(id).replace('task_', '').replace('NS_task_', '');
                             const parsed = parseInt(parsedId); 
                             if(!isNaN(parsed) && parsed > 1 && parsed <= 50000) rNum = parsed;
                             else rNum = null;
                          }

                          if (rNum && rNum > 1 && rNum <= 50000) {
                              pendingUpdatesRef.current = pendingUpdatesRef.current.filter(u => !(u.row === rNum && u.field === field && u.sheetName === targetSheetName));
                              pendingUpdatesRef.current.push({ row: rNum, field: field, value: value, sheetName: targetSheetName });
                              hasValidUpdate = true;
                          } else {
                              console.warn(`⚠️ [Blocked] ข้ามการส่งซิงค์ลง Sheet งาน ${id} เนื่องจากเลขบรรทัดผิดปกติ (${rNum})`);
                          }
                      });

                      if (!hasValidUpdate) {
                          customAlert('ข้อมูลงานนี้กำลังซิงค์อยู่ หรือหาเลขบรรทัดใน Sheet ไม่พบ กรุณารอสักครู่แล้วรีเฟรชหน้าเว็บอีกครั้งครับ', 'warning');
                          return true;
                      }

                      setIsBackgroundSyncing(true);
                      if (syncTimerRef.current) clearTimeout(syncTimerRef.current);

                      syncTimerRef.current = setTimeout(() => {
                          if (pendingUpdatesRef.current.length === 0) return;

                          const updatesToSync = [...pendingUpdatesRef.current];
                          pendingUpdatesRef.current = [];

                          const updatesBySheet = {};
                          updatesToSync.forEach(u => {
                              if(!updatesBySheet[u.sheetName]) updatesBySheet[u.sheetName] = [];
                              updatesBySheet[u.sheetName].push(u);
                          });

                          Object.keys(updatesBySheet).forEach(sheet => {
                              const payloadData = JSON.stringify({ 
                                  action: 'updateBatch', 
                                  sheetName: sheet, 
                                  updates: updatesBySheet[sheet],
                                  row: updatesBySheet[sheet][0].row,
                                  field: updatesBySheet[sheet][0].field,
                                  value: updatesBySheet[sheet][0].value
                              });
                              
                              fetch(GAS_WEB_APP_URL, {
                                  method: 'POST',
                                  headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                  body: payloadData
                              }).then(res => res.json()).then(data => {
                                  // ให้ GAS กดกระดิ่งเตือนเครื่องอื่นว่ามีข้อมูลใหม่
                                  collectionRef.doc('_sync_status').set({ status: 'syncing', timestamp: Date.now() });
                              }).catch(err => {
                                  console.error('❌ ไม่สามารถอัปเดต Google Sheet ได้:', err);
                              });
                          });

                          setTimeout(() => setIsBackgroundSyncing(false), 2000);
                      }, 1500);
                  }
                  return true;
              } catch (e) {
                  console.error("Error updating document: ", e); 
                  customAlert('เกิดข้อผิดพลาดในการบันทึกข้อมูล', 'error');
                  return false;
              }
          };

          // ================== DATA PROCESSING & TABLE ==================
          const finalTableTasks = useMemo(() => {
              let tableTasks = [...(currentTasksTable || [])]; 

              if (showDuplicatesOnly && t_cidCol) {
                  const cidCounts = {};
                  tableTasks.forEach(t => {
                      const cid = t[t_cidCol] ? String(t[t_cidCol]).trim() : '';
                      if (cid && cid !== '-' && cid.toLowerCase() !== 'n/a') {
                          cidCounts[cid] = (cidCounts[cid] || 0) + 1;
                      }
                  });
                  tableTasks = tableTasks.filter(t => {
                      const cid = t[t_cidCol] ? String(t[t_cidCol]).trim() : '';
                      return cidCounts[cid] > 1;
                  });
              }

              if (tableFilterTeams?.length > 0 && t_teamCol) tableTasks = tableTasks.filter(t => tableFilterTeams.includes(getCleanTeam(t[t_teamCol])));
              if (tableFilterCID !== 'All' && t_cidCol) tableTasks = tableTasks.filter(t => (t[t_cidCol] ? String(t[t_cidCol]).trim() : '') === tableFilterCID);
              if (tableFilterYear?.length > 0 && t_equipYearCol) tableTasks = tableTasks.filter(t => tableFilterYear.includes(t[t_equipYearCol] ? String(t[t_equipYearCol]).trim() : ''));
              if (tableFilterStatus?.length > 0 && t_statusCol) tableTasks = tableTasks.filter(t => tableFilterStatus.includes(getCleanStatus(t[t_statusCol])));
              if (tableFilterDate?.length > 0) { tableTasks = tableTasks.filter(t => { const d = parseDateHelper(t_collectionDateCol ? t[t_collectionDateCol] : null); return d && tableFilterDate.includes(monthNames[d.getMonth()]); }); }
              if (tableFilterOverdue?.length > 0 && t_overDueCol) {
                  tableTasks = tableTasks.filter(t => {
                      const cleanVal = getCleanStatus(t[t_overDueCol] || '').toLowerCase(); if (cleanVal === 'ไม่ระบุสถานะ' || !cleanVal) return false;
                      const match = cleanVal.match(/-?\d+/); const num = match ? parseInt(match[0], 10) : NaN;
                      const isOverdue = cleanVal.includes('เกิน') || cleanVal.includes('over') || num < 0;
                      const isDue = !isOverdue && (num === 0 || cleanVal === '0' || cleanVal.includes('ครบกำหนด'));
                      const statusStr = isOverdue ? 'เกินกำหนด' : (isDue ? 'ครบกำหนด' : 'ยังไม่ครบกำหนด');
                      return tableFilterOverdue.includes(statusStr);
                  });
              }
              
              if (sortConfig.key && sortConfig.direction) {
                  tableTasks.sort((a, b) => sortConfig.direction === 'asc' ? String(a[sortConfig.key] || '').localeCompare(String(b[sortConfig.key] || ''), 'th', { numeric: true }) : String(b[sortConfig.key] || '').localeCompare(String(a[sortConfig.key] || ''), 'th', { numeric: true }));
              } else {
                  tableTasks.sort((a, b) => parseInt(a._rowIndex) - parseInt(b._rowIndex));
              }
              // 🔥 กรองตาม Region Responsible (เฉพาะหน้า Subcontract)
             let processedTasks = [...tableTasks];

              // 🟢 1. ทำการ Mapping ข้อมูล Region Responsible ก่อน (เฉพาะหน้า Subcontract)
              if (tasksSubTab === 'subcontract') {

                  const nsCidMap = {};

                      nsTasks.forEach(nt => {
                          if (!nt) return;
                          const cid = nt[nsCidCol] ? String(nt[nsCidCol]).trim() : '';
                          if (cid) nsCidMap[cid] = nt[nsTeamCol];
                      });
                  }

                  // ใส่ข้อมูล Region_Respon ลงในทุกแถวเพื่อให้ระบบรู้จักคอลัมน์นี้ก่อนกรอง
                  processedTasks = processedTasks.map(t => {
                      const cid = t_cidCol ? String(t[t_cidCol] || '').trim() : '';
                      return { ...t, 'Region_Respon': nsCidMap[cid] || '-' };
                  });

                  // 🟢 2. กรองตาม Region Responsible (ถ้ามีการเลือก)
                  if (Array.isArray(tableFilterRegionRespon) && tableFilterRegionRespon.length > 0) {
                      processedTasks = processedTasks.filter(t => {
                          const val = t['Region_Respon'] || '-';
                          return tableFilterRegionRespon.includes(val);
                      });
                  }
              }
              
              // 🟢 3. กรองด้วยคำค้นหา (Search)
              if (searchTerm) {
                  processedTasks = processedTasks.filter(t => 
                      Object.values(t).some(val => String(val).toLowerCase().includes(searchTerm.toLowerCase()))
                  );
              }

              if (tasksSubTab === 'ns') {
                  const grouped = new Map();

              const calTimeCol = (columns || []).find(c => { const lc = c ? String(c).toLowerCase() : ''; return !lc.includes('ประทับเวลา') && !lc.includes('timestamp') && (lc.includes('เวลาเข้าเก็บ') || lc.includes('เวลาเก็บ') || lc.includes('เวลา') || lc.includes('time')); }) || (columns?.length > 6 ? columns[6] : '');
              const calDateCol = (columns || []).find(c => c ? String(c).replace(/[\s_]+/g, '').includes('วันที่เข้าเก็บ') : false) || (columns || []).find(c => { const lc = c ? String(c).toLowerCase() : ''; return lc.includes('วันที่') || lc.includes('date'); }) || columns?.[0] || '';

              const calContactCol = (columns || []).find(c => ['ผู้ติดต่อ', 'ติดต่อ', 'ชื่อลูกค้า', 'ประสานงาน', 'ชื่อ'].some(kw => c ? String(c).toLowerCase().includes(kw) : false)) || '';
              const calPhoneCol = (columns || []).find(c => c !== calContactCol && (c ? String(c).includes('เบอร์') || String(c).toLowerCase().includes('tel') || String(c).toLowerCase().includes('phone') || String(c).includes('โทร') : false)) || '';
              const calNoteCol = (columns || []).find(c => { const lc = c ? String(c).toLowerCase() : ''; return lc.includes('หมายเหตุ') || lc.includes('note'); }) || '';

                  if (isDA !== isDB) return isDA - isDB;

                                                  <span className="flex items-center gap-1.5 text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full border border-emerald-100">C = Completed</span>
                                                  <span className="flex items-center gap-1.5 text-blue-600 bg-blue-50 px-3 py-1 rounded-full border border-blue-100">P = On Process</span>
                                              </div>
                                          </div>
                                          <div className="relative h-80 md:h-96 w-full overflow-x-auto custom-scrollbar pb-4">
                                              <div className="min-w-[700px] h-full">
                                                  {chartFilteredTasks?.length > 0 ? <ChartComponent type="bar" data={teamChartData} options={teamChartOptions} /> : <p className="text-slate-400 text-center mt-20">ไม่มีข้อมูล</p>}
                                              </div>
                                          </div>
                                      </div>

                                      {/* กราฟไม่ระบุทีม (1 ส่วน) */}

                                          <div className="flex justify-between items-center mb-6">
                                              <h3 className="text-base md:text-lg font-bold flex items-center gap-2 text-amber-700">
                                                  <div className="w-9 h-9 rounded-xl bg-amber-50 text-amber-600 flex items-center justify-center shadow-inner"><i className="fa-solid fa-layer-group"></i></div>
                                                  งานค้าง (ไม่ระบุทีม)
                                              </h3>
                                          </div>
                                          <div className="relative h-80 md:h-96 w-full">
                                              {chartFilteredTasks?.length > 0 ? <ChartComponent type="bar" data={unassignedChartData} options={unassignedChartOptions} /> : <p className="text-slate-400 text-center mt-20">ไม่มีข้อมูล</p>}
                                          </div>
                                      </div>
                                  </>
                              ) : (
                                  /* มุมมอง Subcontract ปกติ */
                                  <div className="bg-white p-5 md:p-7 rounded-[2rem] shadow-xl shadow-slate-200/50 border border-slate-100 h-full">
                                      <div className="flex justify-between items-center mb-6">
                                          <h3 className="text-base md:text-xl font-bold flex items-center gap-3 text-slate-800">
                                              <div className="w-10 h-10 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center shadow-inner"><i className="fa-solid fa-users-gear"></i></div>
                                              ปริมาณงานและสถานะแยกตามทีม
                                          </h3>
                                      </div>
                                      <div className="relative h-80 md:h-96 w-full overflow-x-auto custom-scrollbar pb-4">
                                          <div className="min-w-[500px] h-full">
                                              {chartFilteredTasks?.length > 0 ? <ChartComponent type="bar" data={teamChartData} options={teamChartOptions} /> : <p className="text-slate-400 text-center mt-20">ไม่มีข้อมูล</p>}
                                          </div>
                                      </div>
                                  </div>
                              )}
                          </div>
                          
                          {/* กราฟเกินกำหนดนัดหมาย (แสดงเฉพาะหน้า Subcontract) */}
                          {dashboardView === 'subcontract' && (
                              <div className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200 lg:col-span-1">
                                  <div className="flex justify-between items-center mb-4"><h3 className="text-base md:text-lg font-bold flex items-center gap-2"><i className="fa-solid fa-triangle-exclamation text-red-600"></i> เกินกำหนดนัดหมาย</h3></div>
                                  <div className="relative h-64 md:h-80 w-full overflow-x-auto custom-scrollbar pb-2"><div className="min-w-[300px] h-full">{chartFilteredTasks?.length > 0 ? <ChartComponent type="bar" data={overdueChartData} options={overdueChartOptions} /> : <p className="text-slate-400 text-center mt-20">ไม่มีข้อมูล</p>}</div></div>
                              </div>
                          )}
                      </div>
                    </div>
                  </div>
                )}

                {/* --- 2. หน้าตารางงาน --- */}
                {activeTab === 'tasks' && (
                  <div className="absolute inset-0 flex flex-col p-2 md:p-4 lg:p-6 overflow-hidden bg-slate-50 min-h-0">
                    <header className="shrink-0 flex flex-col md:flex-row justify-between items-start gap-4 mb-2">
                      <div className="flex items-center gap-3">
                        <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 bg-white border border-slate-200 shadow-sm rounded-lg hover:bg-slate-50 text-slate-600 transition-colors hidden lg:block"><i className="fa-solid fa-bars"></i></button>
                        <div><h2 className="text-xl md:text-3xl font-bold text-slate-900">ตารางงาน {tasksSubTab === 'ns' ? '(Region Tasks)' : '(Subcontract)'}</h2></div>
                      </div>
                      <button onClick={() => setShowHistoryModal(true)} className="flex items-center gap-2 bg-indigo-50 text-indigo-700 hover:bg-indigo-100 hover:text-indigo-800 px-4 py-2 rounded-lg font-bold border border-indigo-200 transition-colors text-sm shadow-sm">
                          <i className="fa-solid fa-clock-rotate-left"></i> ดูประวัติการแก้ไข
                      </button>
                    </header>

                    {firebaseError && <div className="shrink-0 bg-red-50 border-l-4 border-red-500 p-4 rounded-md shadow-sm mb-4"><div className="flex items-center"><i className="fa-solid fa-circle-exclamation text-red-500 text-xl mr-3"></i><div><p className="text-red-700 font-bold">แจ้งเตือนระบบ</p><p className="text-red-600 text-sm mt-1">{firebaseError}</p></div></div></div>}

                    <div className="shrink-0 bg-white p-3 md:p-4 rounded-xl shadow-sm border border-slate-200 space-y-3 md:space-y-4 mb-4">
                        <div className="flex flex-col md:flex-row items-center gap-3 md:gap-4">
                            <div className="relative w-full"><i className="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i><input type="text" placeholder="พิมพ์คำค้นหา..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full bg-slate-50 border border-slate-300 rounded-lg pl-10 pr-4 py-2 outline-none focus:ring-2 focus:ring-blue-500 text-sm font-medium" /></div>
                        </div>
                        <div className="flex flex-wrap items-center gap-2 md:gap-3 pt-3 border-t border-slate-100">
                            <span className="text-xs md:text-sm font-semibold text-slate-600 hidden md:inline-block"><i className="fa-solid fa-filter mr-1"></i> ตัวกรอง:</span>
                            {t_teamCol && <div className="w-[calc(50%-4px)] sm:w-auto"><MultiSelect options={tableUniqueTeams} selected={tableFilterTeams} onChange={setTableFilterTeams} placeholder="ทีมงาน" /></div>}
                            {t_collectionDateCol && <div className="w-[calc(50%-4px)] sm:w-auto"><MultiSelect options={tableUniqueColMonths.map(m => monthNames[m-1])} selected={tableFilterDate} onChange={setTableFilterDate} placeholder="เดือน" /></div>}
                            {t_equipYearCol && <div className="w-[calc(50%-4px)] sm:w-auto"><MultiSelect options={tableUniqueYears} selected={tableFilterYear} onChange={setTableFilterYear} placeholder="ปี" /></div>}
                            {t_statusCol && <div className="w-[calc(50%-4px)] sm:w-auto"><MultiSelect options={tableUniqueStatuses} selected={tableFilterStatus} onChange={setTableFilterStatus} placeholder="Status" /></div>}
                            {t_overDueCol && <div className="w-[calc(50%-4px)] sm:w-auto"><MultiSelect options={['ครบกำหนด', 'ยังไม่ครบกำหนด', 'เกินกำหนด']} selected={tableFilterOverdue} onChange={setTableFilterOverdue} placeholder="นัดหมายลูกค้า" /></div>}
                            {tasksSubTab === 'subcontract' && (
                                <div className="w-[calc(50%-4px)] sm:w-auto">
                                    <MultiSelect 
                                        options={(() => {
                                            const nsTeamCol = getTeamColumnName(nsColumns);
                                            const nsCidCol = nsColumns.find(c => ['cid', 'circuitno'].some(kw => c ? String(c).toLowerCase().replace(/[\s_]+/g,'').includes(kw) : false)) || '';
                                            if (!nsTeamCol || !nsCidCol) return ['-'];

                                            const nsCidMap = {};
                                            nsTasks.forEach(nt => {
                                                const cid = String(nt[nsCidCol] || '').trim();
                                                if (cid) nsCidMap[cid] = nt[nsTeamCol];
                                            });

                                            const subCidKey = t_getCol(['cid', 'circuitno']);
                                            const regionsInSub = tasks.map(t => {
                                                const cid = String(t[subCidKey] || '').trim();
                                                return nsCidMap[cid] || '-';
                                            });
                                            return [...new Set(regionsInSub)].sort();
                                        })()} 
                                        selected={tableFilterRegionRespon} 
                                        onChange={setTableFilterRegionRespon} 
                                        placeholder="Region Respon" 
                                    />
                                </div>
                            )}
                            <div className="ml-auto flex flex-wrap items-center gap-2 mt-2 md:mt-0 w-full sm:w-auto">
                                {tasksSubTab === 'subcontract' && t_cidCol && (
                                    <button 
                                        onClick={() => setShowDuplicatesOnly(!showDuplicatesOnly)} 
                                        className={`flex-1 sm:flex-none flex items-center justify-center gap-1.5 text-xs md:text-sm font-bold px-3 py-1.5 rounded-lg border h-[38px] transition-colors ${showDuplicatesOnly ? 'bg-amber-500 text-white border-amber-600 shadow-inner' : 'bg-amber-50 text-amber-600 border-amber-200 hover:bg-amber-100'}`}
                                    >
                                        <i className="fa-solid fa-copy"></i> {showDuplicatesOnly ? 'แสดงทั้งหมด' : 'เช็ค CID ซ้ำ'}

                                <ColumnToggle columns={currentColumnsTable} hiddenColumns={hiddenColumns} setHiddenColumns={setHiddenColumns} />

                            </div>
                        </div>
                    </div>

                    <div className="flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col min-h-0 overflow-hidden relative">
                      <div className="flex-1 overflow-auto table-container relative" onScroll={handleTableScroll}>
                        <table className="w-full text-left border-collapse text-sm relative" style={{ tableLayout: 'auto' }}>
                          <thead className="bg-slate-800 shadow-sm shadow-slate-800/50 sticky top-0 z-40">
                            <tr>
                              {(orderedVisibleColumnsTable || []).map((col, idx) => {
                                  const colConfig = (masterData.columnSettings || {})[col] || { mode: 'fixed', width: '150' };
                                  const isAuto = colConfig.mode === 'auto';
                                  const isPinned = (pinnedColumns || []).includes(col);
                                  const isLastPinned = isPinned && col === pinnedColsListTable?.[(pinnedColsListTable?.length || 1) - 1];
                                  
                                  let finalWidth = colWidths[col] || (isAuto ? 'max-content' : `${colConfig.width}px`);
                                  if (typeof finalWidth === 'number') finalWidth = `${finalWidth}px`;

                                  let thStyle = { 
                                      whiteSpace: isAuto ? 'nowrap' : 'normal', 
                                      wordBreak: isAuto ? 'normal' : 'break-word',
                                      width: finalWidth, minWidth: finalWidth, maxWidth: isAuto ? 'none' : finalWidth
                                  };

                                  if (isPinned) {
                                      thStyle.position = 'sticky';
                                      thStyle.left = getPinnedLeftPos(col, orderedVisibleColumnsTable);
                                      thStyle.zIndex = 50;
                                  }

                                  return (
                                      <th key={idx} className={`p-0 align-middle relative group transition-colors select-none sortable-header bg-slate-800 border-r border-slate-700 hover:bg-slate-700 ${isLastPinned ? 'shadow-[4px_0_6px_-1px_rgba(0,0,0,0.3)] border-r-slate-500' : ''}`} style={thStyle}>
                                          <div className="flex items-center justify-center px-4 py-3 w-full h-full cursor-pointer relative" onClick={() => handleSort(col)}>
                                            {/* 🔥 จัดข้อความให้อยู่กึ่งกลาง */}
                                            <div className="flex items-center justify-center gap-2 overflow-hidden w-full px-6 text-center">
                                                <div className="th-content text-xs md:text-sm font-semibold text-white truncate">{col}</div>
                                            </div>
                                            {/* 🔥 ย้ายปุ่ม Pin/Sort ไปไว้ด้านขวา */}
                                            <div className="absolute right-2 flex items-center gap-1 opacity-60">
                                                <button onClick={(e) => { e.stopPropagation(); handlePinToggle(e, col); }} className={`hover:scale-125 transition-transform ${isPinned ? 'text-blue-400' : 'text-slate-400 hover:text-white'}`}>
                                                    <i className="fa-solid fa-thumbtack text-[10px]"></i>
                                                </button>
                                                <div className="text-white shrink-0 text-[10px]">{sortConfig.key === col ? (sortConfig.direction === 'asc' ? '▲' : '▼') : ''}</div>
                                            </div>
                                          </div>
                                          <div onPointerDown={(e) => { e.stopPropagation(); handlePointerDown(e, col); }} onDoubleClick={(e) => { e.stopPropagation(); setColWidths(prev => ({ ...prev, [col]: 'max-content' })); }} className="absolute right-0 top-0 bottom-0 w-4 cursor-col-resize z-10 hover:bg-blue-500 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                      </th>
                                  );
                              })}
                              {/* 🔥 แก้ไขให้ปรับขนาดได้โดยใช้ ID '__manage__' */}
                              <th className="bg-slate-800 border-l border-slate-700 p-0 align-middle sticky right-0 z-40 shadow-[-4px_0_6px_-1px_rgba(0,0,0,0.2)] text-white text-xs font-bold text-center group" style={{ width: colWidths['__manage__'] || '100px', minWidth: colWidths['__manage__'] || '100px' }}>
                                  จัดการ
                                  <div onPointerDown={(e) => { e.stopPropagation(); handlePointerDown(e, '__manage__'); }} className="absolute left-0 top-0 bottom-0 w-1 cursor-col-resize z-10 hover:bg-blue-500 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                              </th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-200">
                            {paginatedTasks.map((task) => (
                              <tr key={task.id} className="hover:bg-slate-50 transition-colors" style={{ height: (rowHeights && rowHeights[task.id]) ? `${rowHeights[task.id]}px` : 'auto' }}>
                                {(orderedVisibleColumnsTable || []).map((col, idx) => {
                                    // --- Logic ภายในก้อนเดียวเพื่อป้องกันจอขาว ---
                                    const val = task[col] || '';
                                    const cleanVal = String(val).trim();
                                    const cellId = `${task.id}-${col}`;
                                    const isEditing = editingCell === cellId;
                                    
                                    // หาชื่อคอลัมน์แบบ Dynamic
                                    const isStatus = col === t_statusCol;
                                    const isTeam = col === t_teamCol;
                                    const isCid = (col === t_cidCol || col.toLowerCase().includes('cid') || col.toLowerCase().includes('circuit'));
                                    const isOverdue = (col === t_overDueCol || col.includes('นัดหมาย'));
                                    const isStatusChange = col.toLowerCase().includes('status_change');
                                    const isContact = col === contactJobColMatch;
                                    const isEquip = col === 'รายการอุปกรณ์';

                                    const colConfig = (masterData.columnSettings || {})[col] || { mode: 'fixed', width: '150' };
                                    const isPinned = (pinnedColumns || []).includes(col);
                                    const isLastPinned = isPinned && col === pinnedColsListTable?.[(pinnedColsListTable?.length || 1) - 1];
                                    const finalWidth = colWidths[col] || (colConfig.mode === 'auto' ? 'max-content' : `${colConfig.width}px`);

                                    // ตั้งค่าสี
                                    let styleObj = { backgroundColor: 'transparent', color: 'inherit', fontWeight: 'normal' };
                                    if (isStatus) {
                                        styleObj = { backgroundColor: getStatusColor(cleanVal, 0.15), color: getStatusColor(cleanVal, 1), fontWeight: 'bold' };
                                    } else if (isTeam) {
                                        const tColor = getTeamColorStyle(val, masterData);
                                        styleObj = { backgroundColor: tColor.bg, color: tColor.text, border: `1px solid ${tColor.border}`, fontWeight: 'bold' };
                                    } else if (isCid && cleanVal) {
                                        const s = getCleanStatus(task[t_statusCol]);
                                        styleObj = { backgroundColor: getStatusColor(s, 0.1), color: getStatusColor(s, 1), fontWeight: 'bold', border: `1px solid ${getStatusColor(s, 0.2)}` };
                                    } else if (isOverdue && cleanVal && cleanVal !== 'ไม่ระบุสถานะ') {
                                        let num = NaN; const m = cleanVal.match(/-?\d+/); if(m) num = parseInt(m[0], 10);
                                        if (cleanVal.includes('เกิน') || num < 0) styleObj = { backgroundColor: '#fee2e2', color: '#991b1b', fontWeight: 'bold' };
                                        else if (num === 0 || cleanVal.includes('ครบ')) styleObj = { backgroundColor: '#fef08a', color: '#854d0e', fontWeight: 'bold' };
                                        else styleObj = { backgroundColor: '#dcfce7', color: '#14532d', fontWeight: 'bold' };
                                    } else if (isStatusChange && cleanVal) {
                                        styleObj = { backgroundColor: '#fff7ed', color: '#b45309', fontWeight: '600', border: '1px solid #fef08a' };
                                    }

                                    let tdStyle = { verticalAlign: 'top', width: finalWidth, minWidth: finalWidth, maxWidth: finalWidth };
                                    if (isPinned) {
                                        tdStyle.position = 'sticky';
                                        tdStyle.left = getPinnedLeftPos(col, orderedVisibleColumnsTable);
                                        tdStyle.zIndex = 20;
                                    }

                                    return (
                                        <td key={idx} className={`p-1 md:p-1.5 align-middle border-r border-slate-100 bg-white ${isPinned ? 'sticky-col-cell' : ''} ${isLastPinned ? 'shadow-[4px_0_6px_-1px_rgba(0,0,0,0.1)] border-r-slate-300' : ''}`} style={tdStyle}>
                                            <div className="flex items-stretch w-full mx-auto relative" style={{ backgroundColor: styleObj.backgroundColor, border: styleObj.border || 'none', borderRadius: '6px', overflow: 'hidden', boxSizing: 'border-box', width: '100%', maxWidth: '100%' }}>
                                                <div 
                                                    contentEditable={isEditing} 
                                                    suppressContentEditableWarning={true} 
                                                    className={`px-3 py-1 outline-none editable-cell ${isEditing ? 'editing text-slate-800' : ''}`} 
                                                    style={{ 
                                                        color: styleObj.color, fontWeight: styleObj.fontWeight, display: 'block', width: '100%', minWidth: 0, boxSizing: 'border-box', minHeight: '28px', 
                                                        height: (rowHeights && rowHeights[task.id]) ? `${rowHeights[task.id]}px` : 'auto',
                                                        whiteSpace: (isContact || isEquip || isStatusChange || (task._groupDocs && task._groupDocs.length > 1)) ? 'pre-wrap' : (colConfig.mode === 'auto' ? 'nowrap' : 'normal'), 
                                                        wordBreak: 'break-word', lineHeight: '1.5', overflow: 'visible', textAlign: (isStatus || isTeam || isCid || isOverdue) ? 'center' : 'left'
                                                    }} 
                                                    onDoubleClick={(e) => handleCellDoubleClick(e, cellId)} 
                                                    onBlur={e => { handleCellChangeTable(task, col, e.target.innerText, (tasksSubTab === 'subcontract' ? columns : nsColumns)); setEditingCell(null); }}
                                                >
                                                    {val}
                                                </div>
                                                {(isStatus || isTeam) && (
                                                    // 🔥 เพิ่ม z-10 และขยายความกว้าง w-8 เพื่อให้กดติดง่ายขึ้น
                                                    <div className="relative w-8 flex-shrink-0 flex items-center justify-center hover:bg-black/10 cursor-pointer border-l border-black/5 z-10">
                                                        <select 
                                                            className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" 
                                                            value="" 
                                                            onChange={e => handleCellChangeTable(task, col, e.target.value, (tasksSubTab === 'subcontract' ? columns : nsColumns))}
                                                        >
                                                            <option value="" disabled></option>
                                                            {/* 🔥 บังคับสีตัวเลือกเป็นสีดำพื้นขาวเพื่อให้มองง่าย */}
                                                            {(isStatus ? (tasksSubTab === 'ns' ? masterData.nsStatuses : masterData.subconStatuses) : (tasksSubTab === 'ns' ? masterData.nsTeams : masterData.teams)).map(opt => {
                                                                const name = typeof opt === 'string' ? opt : opt.name;
                                                                return <option key={name} value={name} className="text-black bg-white">{name}</option>
                                                            })}
                                                        </select>
                                                        <i className="fa-solid fa-chevron-down text-[8px] opacity-40"></i>
                                                    </div>
                                                )}
                                            </div>
                                        </td>
                                    );
                                })}
                                <td className="p-1 align-middle border-l border-slate-200 bg-slate-50 sticky right-0 z-30 text-center group relative">
                                    <div className="flex flex-col gap-2 px-1 py-1">
                                        {tasksSubTab === 'ns' ? (
                                            <button onClick={() => handleDirectAssign(task[t_cidCol], task[siteTypeColMatch])} className="py-2 bg-indigo-50 border border-indigo-300 text-indigo-700 hover:bg-indigo-600 hover:text-white rounded-lg text-xs font-black flex items-center justify-center gap-2 shadow-sm transition-all active:scale-95">
                                                <i className="fa-solid fa-bolt text-sm"></i> จ่ายงาน
                                            </button>
                                        ) : (
                                            <button onClick={() => handleDeleteTask(task)} className="py-2 bg-red-50 border border-red-300 text-red-600 hover:bg-red-600 hover:text-white rounded-lg text-xs font-black flex items-center justify-center gap-2 shadow-sm transition-all active:scale-95">
                                                <i className="fa-solid fa-trash-can text-sm"></i> ลบ
                                            </button>
                                        )}
                                    </div>
                                    <div onPointerDown={(e) => handleRowPointerDown(e, task.id)} className="absolute bottom-0 left-0 right-0 h-1 cursor-row-resize hover:bg-blue-400 opacity-0 group-hover:opacity-100"></div>
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                      
                      {/* Footer UI (Infinite Scroll) */}
                      <div className="shrink-0 bg-slate-50 border-t border-slate-200 p-2 md:p-3 px-3 md:px-5 flex flex-col sm:flex-row items-center justify-between z-20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] gap-3">
                          <div className="text-xs md:text-sm font-semibold text-blue-700 flex items-center gap-2 bg-blue-100 px-3 py-1.5 rounded-lg border border-blue-200 shadow-sm w-full sm:w-auto justify-center">
                              <i className="fa-solid fa-list-check"></i>แสดงผลทั้งหมด {finalTableTasks?.length || 0} รายการ
                          </div>
                          <div className="text-xs text-slate-500 font-medium bg-white px-3 py-1.5 rounded-lg border border-slate-200 shadow-sm">
                              กำลังแสดง {paginatedTasks.length} จาก {finalTableTasks?.length || 0} รายการ <span className="text-blue-500 ml-1">(เลื่อนลงเพื่อโหลดเพิ่ม)</span>
                          </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* --- 3. หน้าปฏิทิน --- */}
                {activeTab === 'calendar' && (
                  <div className="absolute inset-0 flex flex-col p-2 md:p-4 lg:p-6 overflow-hidden bg-slate-50 min-h-0">
                    <header className="shrink-0 flex flex-col md:flex-row justify-between items-start md:items-end gap-4 mb-4">
                      <div className="flex items-center gap-3">
                        <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 bg-white border border-slate-200 shadow-sm rounded-lg hover:bg-slate-50 text-slate-600 transition-colors hidden lg:block">
                            <i className="fa-solid fa-bars"></i>
                        </button>
                        <div>
                            <h2 className="text-xl md:text-3xl font-bold text-slate-900">ปฏิทิน (Calendar)</h2>

                              <div key={d} className="py-2 md:py-3 text-center text-xs md:text-sm font-semibold text-slate-600 border-r border-b border-slate-200">

                                  <span className="hidden md:inline">{['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'][i]}</span>
                              </div>

                          </div>
                          <div className="flex-1 overflow-y-auto custom-scrollbar">

                                  return (
                                    <div key={idx} className="bg-white p-1 md:p-2 flex flex-col border-r border-b border-slate-200 group hover:bg-slate-50/50 transition-colors h-full overflow-hidden min-h-[100px]">

                                                const softBg = getStatusColor(t._calStatusCol ? t[t._calStatusCol] : '', 0.1);
                                                const colDate = t._calDateCol ? t[t._calDateCol] : '-';

                                                  <div key={t.id} style={{borderLeftColor: border}} className="p-1.5 md:p-2 rounded-lg md:rounded-xl border border-l-2 md:border-l-4 shadow-sm bg-white text-[9px] md:text-xs space-y-1 cursor-pointer hover:shadow-md transition-shadow" onMouseMove={(e) => handleMouseMove(e, t)} onMouseLeave={handleMouseLeave} onClick={() => { if(window.innerWidth <= 1024) { setCalendarView('day'); setCurrentDate(dateObj); } }}>
                                                    {/* ทีม */}

                                                    {/* บริษัทลูกค้า */}
                                                    <div className="font-bold text-slate-800 leading-tight line-clamp-2" title={t._calCompCol ? t[t._calCompCol] : 'ไม่ระบุชื่อ'}>{t._calCompCol ? t[t._calCompCol] : 'ไม่ระบุชื่อ'}</div>
                                                    
                                                    {/* วันที่และเวลา */}
                                                    <div className="flex items-center gap-1 text-slate-600 font-medium text-[8px] md:text-[10px] mt-0.5 flex-wrap">
                                                        <i className="fa-regular fa-calendar-check"></i> {colDate} 
                                                        {colTime !== '-' && <><i className="fa-regular fa-clock ml-0.5"></i> {colTime}</>}
                                                    </div>
                                                    
                                                    {/* Status */}
                                                    <div className="mt-1 text-center font-bold px-1 py-0.5 rounded border text-[8px] md:text-[10px] truncate" style={{backgroundColor: softBg, color: border, borderColor: border}}>
                                                        {t._calStatusCol ? t[t._calStatusCol] : 'ไม่มีสถานะ'}
                                                    </div>
                                                  </div>
                                                );
                                            })}
                                          </div>
                                        </>
                                      )}
                                    </div>
                                  );
                                })}
                              </div>
                          </div>
                        </div>
                      )}

                      {calendarView === 'week' && (
                        <div className="flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col min-h-0 overflow-hidden">
                          <div className="grid grid-cols-7 border-l border-t border-slate-200 shrink-0 bg-slate-50 z-10">
                            {(weekSlots || []).map((dateObj, idx) => (
                              <div key={idx} className="py-2 md:py-3 text-center border-r border-b border-slate-200">
                                <div className="text-[10px] md:text-sm font-semibold text-slate-500">
                                    <span className="md:hidden">{['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'][dateObj.getDay()]}</span>
                                    <span className="hidden md:inline">{['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'][dateObj.getDay()]}</span>
                                </div>
                                <div 
                                  onClick={() => { setCalendarView('day'); setCurrentDate(dateObj); }}
                                  title="คลิกเพื่อดูรายละเอียดรายวัน"
                                  className={`text-base md:text-2xl font-bold mt-1 cursor-pointer transition-colors inline-block px-2 md:px-3 py-0.5 md:py-1 rounded-lg hover:bg-blue-100 hover:text-blue-700 ${dateObj.getDate() === new Date().getDate() && dateObj.getMonth() === new Date().getMonth() ? 'text-blue-600' : 'text-slate-800'}`}

                                </div>
                              </div>

                                                const border = getStatusColor(t._calStatusCol ? t[t._calStatusCol] : '', 1);
                                                const softBg = getStatusColor(t._calStatusCol ? t[t._calStatusCol] : '', 0.1);
                                                
                                                const colDate = t._calDateCol ? t[t._calDateCol] : '-';
                                                const colTime = t._calTimeCol ? t[t._calTimeCol] : '-';

                                                return (
                                                  <div key={t.id} style={{borderLeftColor: border}} className="p-1.5 md:p-3 rounded-lg md:rounded-xl border border-l-2 md:border-l-4 shadow-sm bg-white text-[10px] md:text-xs space-y-1 md:space-y-1.5 cursor-pointer hover:shadow-md transition-shadow" onMouseMove={(e) => handleMouseMove(e, t)} onMouseLeave={handleMouseLeave} onClick={() => { if(window.innerWidth <= 1024) { setCalendarView('day'); setCurrentDate(dateObj); } }}>

                                                    <div className="flex items-center gap-1 text-slate-600 font-medium px-1 py-0.5 rounded text-[8px] md:text-[10px] w-fit mt-1">
                                                        <i className="fa-regular fa-calendar-check"></i> {colDate} <i className="fa-regular fa-clock ml-0.5"></i> {colTime}
                                                    </div>
                                                    
                                                    {/* 4. Status */}
                                                    <div className="mt-1.5 text-center font-bold px-1 md:px-2 py-0.5 md:py-1 rounded-md md:rounded-lg border text-[8px] md:text-[10px]" style={{backgroundColor: softBg, color: border, borderColor: border}}>{t._calStatusCol ? t[t._calStatusCol] : 'ไม่มีสถานะ'}</div>

                                            })}
                                        </div>
                                    </div>

                                })}
                            </div>
                          </div>
                        </div>

                            <div className="flex-1 overflow-y-auto custom-scrollbar pr-2">
                                {(dayTasks || []).length === 0 ? (

                                      <i className="fa-regular fa-calendar-xmark text-4xl md:text-6xl mb-3 md:mb-4 text-slate-200"></i>
                                      <p className="text-sm md:text-lg font-medium">ไม่มีงานที่ต้องดำเนินการในวันนี้</p>
                                  </div>
                                ) : (
                                  <div className="space-y-3 md:space-y-4">
                                    {(dayTasks || []).map(t => {
                                        const bgColor = getStatusColor(t._calStatusCol ? t[t._calStatusCol] : '', 1);
                                        const softBg = getStatusColor(t._calStatusCol ? t[t._calStatusCol] : '', 0.1);
                                        
                                        const cidVal = t._calCidCol ? t[t._calCidCol] : '';
                                        const companyVal = t._calCompCol ? t[t._calCompCol] : '-';
                                        
                                        const contactVal = (t._calContactCol && t[t._calContactCol]) ? t[t._calContactCol] : 'ไม่ระบุ';
                                        const phoneVal = (t._calPhoneCol && t[t._calPhoneCol]) ? t[t._calPhoneCol] : '';
                                        
                                        const collectionDateVal = t._calDateCol ? t[t._calDateCol] : '-';
                                        const collectionTimeVal = t._calTimeCol ? t[t._calTimeCol] : '-';
                                        
                                        return (
                                          <div key={t.id} className="flex bg-white rounded-xl md:rounded-2xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition-shadow cursor-pointer relative" onMouseMove={(e) => handleMouseMove(e, t)} onMouseLeave={handleMouseLeave}>

                                            <div className="p-3 md:p-4 flex-1 flex flex-col text-xs md:text-sm min-w-0">
                                                <div className="flex flex-col lg:flex-row gap-3 md:gap-4 lg:items-center w-full min-w-0">
                                                    
                                                    {/* กลุ่มข้อมูลด้านซ้าย */}

                                                            </div>
                                                        </div>

                                                                {cidVal && <span className="text-blue-600 mr-1">[{cidVal}]</span>}
                                                                <span>{companyVal}</span>
                                                            </p>
                                                        </div>

                                                        {/* 3 & 4. ผู้ประสานงาน และ เข้าเก็บ */}
                                                        <div className="flex flex-col sm:flex-row gap-3 sm:gap-6 shrink-0 lg:pl-2">
                                                            {/* 3. ผู้ประสานงาน */}
