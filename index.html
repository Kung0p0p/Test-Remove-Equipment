                             if(!isNaN(parsed) && parsed > 1 && parsed <= 50000) rNum = parsed;
                             else rNum = null;
                          }

                          if (rNum && rNum > 1 && rNum <= 50000) {
                              pendingUpdatesRef.current = pendingUpdatesRef.current.filter(u => !(u.row === rNum && u.field === field && u.sheetName === targetSheetName));
                              pendingUpdatesRef.current.push({ row: rNum, field: field, value: value, sheetName: targetSheetName });
                              hasValidUpdate = true;
                          } else {
                              console.warn(`⚠️ [Blocked] ข้ามการส่งซิงค์ลง Sheet งาน ${id} เนื่องจากเลขบรรทัดผิดปกติ (${rNum})`);
                          }
                      });

                      if (!hasValidUpdate) {
                          customAlert('ข้อมูลงานนี้กำลังซิงค์อยู่ หรือหาเลขบรรทัดใน Sheet ไม่พบ กรุณารอสักครู่แล้วรีเฟรชหน้าเว็บอีกครั้งครับ', 'warning');
                          return true;
                      }

                      // ปิดการใช้ setIsBackgroundSyncing(true) เพื่อไม่ให้จอกระตุก 2-5 วิ ตอนกำลังแก้ไข
                      if (syncTimerRef.current) clearTimeout(syncTimerRef.current);

                      syncTimerRef.current = setTimeout(() => {
                          if (pendingUpdatesRef.current.length === 0) return;

                          const updatesToSync = [...pendingUpdatesRef.current];
                          pendingUpdatesRef.current = [];

                          const updatesBySheet = {};
                          updatesToSync.forEach(u => {
                              if(!updatesBySheet[u.sheetName]) updatesBySheet[u.sheetName] = [];
                              updatesBySheet[u.sheetName].push(u);
                          });

                          Object.keys(updatesBySheet).forEach(sheet => {
                              const payloadData = JSON.stringify({ 
                                  action: 'updateBatch', 
                                  sheetName: sheet, 
                                  updates: updatesBySheet[sheet],
                                  row: updatesBySheet[sheet][0].row,
                                  field: updatesBySheet[sheet][0].field,
                                  value: updatesBySheet[sheet][0].value
                              });
                              
                              fetch(GAS_WEB_APP_URL, {
                                  method: 'POST',
                                  headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                  body: payloadData
                              }).catch(err => console.error('❌ ไม่สามารถอัปเดต Google Sheet ได้:', err));
                          });
                      }, 1500);
                  }
                  return true;
              } catch (e) {
                  console.error("Error updating document: ", e); 
                  customAlert('เกิดข้อผิดพลาดในการบันทึกข้อมูล', 'error');
                  return false;
              }
          };

          // ================== DATA PROCESSING & TABLE ==================
          const finalTableTasks = useMemo(() => {
              let tableTasks = [...(currentTasksTable || [])]; 

              if (showDuplicatesOnly && t_cidCol) {
                  const cidCounts = {};
                  tableTasks.forEach(t => {

                  tableTasks = tableTasks.filter(t => {
                      const cid = t[t_cidCol] ? String(t[t_cidCol]).trim() : '';
                      return cidCounts[cid] > 1;
                  });
              }

              if (tableFilterTeams?.length > 0 && t_teamCol) tableTasks = tableTasks.filter(t => tableFilterTeams.includes(getCleanTeam(t[t_teamCol])));
              if (tableFilterCID !== 'All' && t_cidCol) tableTasks = tableTasks.filter(t => (t[t_cidCol] ? String(t[t_cidCol]).trim() : '') === tableFilterCID);
              if (tableFilterYear?.length > 0 && t_equipYearCol) tableTasks = tableTasks.filter(t => tableFilterYear.includes(t[t_equipYearCol] ? String(t[t_equipYearCol]).trim() : ''));
              if (tableFilterStatus?.length > 0 && t_statusCol) tableTasks = tableTasks.filter(t => tableFilterStatus.includes(getCleanStatus(t[t_statusCol])));
              if (tableFilterDate?.length > 0) { tableTasks = tableTasks.filter(t => { const d = parseDateHelper(t_collectionDateCol ? t[t_collectionDateCol] : null); return d && tableFilterDate.includes(monthNames[d.getMonth()]); }); }
              if (tableFilterOverdue?.length > 0 && t_overDueCol) {
                  tableTasks = tableTasks.filter(t => {
                      const cleanVal = getCleanStatus(t[t_overDueCol] || '').toLowerCase(); if (cleanVal === 'ไม่ระบุสถานะ' || !cleanVal) return false;
                      const match = cleanVal.match(/-?\d+/); const num = match ? parseInt(match[0], 10) : NaN;
                      const isOverdue = cleanVal.includes('เกิน') || cleanVal.includes('over') || num < 0;
                      const isDue = !isOverdue && (num === 0 || cleanVal === '0' || cleanVal.includes('ครบกำหนด'));
                      const statusStr = isOverdue ? 'เกินกำหนด' : (isDue ? 'ครบกำหนด' : 'ยังไม่ครบกำหนด');
                      return tableFilterOverdue.includes(statusStr);
                  });
              }
              
              if (sortConfig.key && sortConfig.direction) {
                  tableTasks.sort((a, b) => sortConfig.direction === 'asc' ? String(a[sortConfig.key] || '').localeCompare(String(b[sortConfig.key] || ''), 'th', { numeric: true }) : String(b[sortConfig.key] || '').localeCompare(String(a[sortConfig.key] || ''), 'th', { numeric: true }));
              } else {
                  tableTasks.sort((a, b) => parseInt(a._rowIndex) - parseInt(b._rowIndex));
              }
              
              if (searchTerm) tableTasks = tableTasks.filter(t => Object.values(t).some(val => String(val).toLowerCase().includes(searchTerm.toLowerCase())));
              
              let processedTasks = tableTasks;

              // 🟢 ดึงข้อมูล Region_Respon มาใส่ในหน้า Subcontract โดยเทียบ CID
              if (tasksSubTab === 'subcontract') {
                  const nsTeamCol = getTeamColumnName(nsColumns);

                  const nsCidMap = {};
                  if (nsCidCol && nsTeamCol) {
                      nsTasks.forEach(nt => {
                          const cid = nt[nsCidCol] ? String(nt[nsCidCol]).trim() : '';

                  }

                  processedTasks = processedTasks.map(t => {
                      const cid = t[t_cidCol] ? String(t[t_cidCol]).trim() : '';

                  });
              }

              if (tasksSubTab === 'ns') {
                  const grouped = new Map();
                  processedTasks.forEach(t => {
                      const cid = t_cidCol ? t[t_cidCol] : '';
                      const st = siteTypeColMatch ? t[siteTypeColMatch] : '';
                      const cleanCid = String(cid).trim();
                      
                      if (!cleanCid || cleanCid === '-' || cleanCid.toLowerCase().includes('ไม่ระบุ') || cleanCid.length < 3) {
                          grouped.set(t.id, { ...t, _groupDocs: [t.id], _groupRows: [t._rowIndex] });

                      }
                      
                      const groupKey = `${cleanCid}_${st}`.trim();
                      if (!grouped.has(groupKey)) {
                          grouped.set(groupKey, { 
                              ...t, 
                              _groupDocs: [t.id],
                              _groupRows: [t._rowIndex],
                              _equipList: [{ item: t[itemColMatch]||'', sn: t[snColMatch]||'' }]
                          });
                      } else {
                          const existing = grouped.get(groupKey);
                          existing._groupDocs.push(t.id);

                          existing._equipList.push({ item: t[itemColMatch]||'', sn: t[snColMatch]||'' });
                      }
                  });

                  processedTasks = Array.from(grouped.values()).map(group => {
                      if (group._equipList && group._equipList.length > 0) {
                          group._equipList.sort((a, b) => {
                              const aHasSn = (a.sn || '').trim() !== '' ? 1 : 0;
                              const bHasSn = (b.sn || '').trim() !== '' ? 1 : 0;
                              return bHasSn - aHasSn;

                          if(itemColMatch) group[itemColMatch] = group._equipList.map((e, i) => `${i+1}. ${e.item} [ SN: ${e.sn||'-'} ]`).join('\n');
                          if(snColMatch) group[snColMatch] = group._equipList.map(e => e.sn).join('\n');
                      }
                      return group;
                  });
              }
              return processedTasks;
          }, [currentTasksTable, currentColumnsTable, tasksSubTab, tableFilterTeams, tableFilterCID, tableFilterYear, tableFilterStatus, tableFilterDate, tableFilterOverdue, sortConfig, searchTerm, showDuplicatesOnly]);

          const totalPages = rowsPerPage === 'All' ? 1 : Math.ceil((finalTableTasks?.length || 0) / rowsPerPage);

          const d_getCol = (keywords) => (dashboardColumns || []).find(c => keywords.some(kw => c ? String(c).toLowerCase().replace(/[\s_]+/g,'').includes(kw.toLowerCase().replace(/[\s_]+/g,'')) : false)) || '';
          
          const d_statusCol = getStatusColumnName(dashboardColumns);
          const d_teamCol = getTeamColumnName(dashboardColumns);
          const d_cidCol = d_getCol(['cid', 'circuitno']) || '';

          const d_collectionDateCol = (dashboardColumns || []).find(c => c ? String(c).replace(/[\s_]+/g, '').includes('วันที่เข้าเก็บ') : false) || d_getCol(['วันที่', 'date']) || dashboardColumns?.[0] || '';
          const d_siteTypeCol = d_getCol(['sitetype', 'site']) || '';

          const getDashboardTaskEffectiveDateStr = (t) => {

          const dashboardUniqueTeams = d_teamCol ? [...new Set((dashboardTasks || []).map(t => getCleanTeam(t[d_teamCol])))].sort() : [];

              let y = null;
              if (eqYearStr) {
                  const yMatch = eqYearStr.match(/\d{4}/);
                  if (yMatch) y = parseInt(yMatch[0], 10); else y = parseInt(eqYearStr, 10);
                  if (y < 100) y += 2000; 
                  if (y > 2500) y -= 543; 
              }

              if (!y && dateObjYear) { y = dateObjYear; if (y > 2500) y -= 543; }
              if (!y) { y = new Date().getFullYear(); }

              if (dashboardView === 'subcontract') {
                  if (dashboardYear === '2026') { if (y !== 2026) matchYearView = false; } 
                  else if (dashboardYear === 'history') { if (y >= 2026) matchYearView = false; }
              }

              if (filterMonth !== 'All' && m !== parseInt(filterMonth)) matchMonth = false;
              if (filterTeams?.length > 0 && d_teamCol && !filterTeams.includes(getCleanTeam(t[d_teamCol]))) matchTeam = false;
              
              return matchMonth && matchTeam && matchYearView;
          });

          if (dashboardView === 'ns') {
              const grouped = new Map();
              dashboardFilteredTasks.forEach(t => {
                  const cid = d_cidCol ? t[d_cidCol] : '';
                  const st = d_siteTypeCol ? t[d_siteTypeCol] : '';
                  if (!cid || String(cid).trim() === '') { grouped.set(t.id, t); return; }
                  const groupKey = `${cid}_${st}`.trim();
                  if (!grouped.has(groupKey)) { grouped.set(groupKey, t); }
              });
              dashboardFilteredTasks = Array.from(grouped.values());
          }

          const toggleStatusFilter = (status) => { if (selectedStatuses.includes(status)) setSelectedStatuses(selectedStatuses.filter(s => s !== status)); else setSelectedStatuses([...selectedStatuses, status]); };
          const chartFilteredTasks = dashboardFilteredTasks.filter(t => selectedStatuses?.length === 0 || selectedStatuses.includes(getCleanStatus(t[d_statusCol])));
          const totalTasksCount = dashboardFilteredTasks?.length || 0;

          const getStatusColor = (status, opacity = 1) => {
              const s = status ? String(status).trim() : '';
              if (masterData.nsStatuses) {
                  const nsStatusMatch = masterData.nsStatuses.find(st => st.name === s);
                  if (nsStatusMatch && nsStatusMatch.bg) {
                      if (opacity === 1 && nsStatusMatch.text) return nsStatusMatch.text;
                      return hexToRgbA(nsStatusMatch.bg, opacity);
                  }
              }
              const sLower = s.toLowerCase();
              if (sLower.includes('สำเร็จ') || sLower.includes('เรียบร้อย') || sLower.includes('complete') || sLower.includes('done') || sLower.includes('100%')) return `rgba(16, 185, 129, ${opacity})`; 
              if (sLower.includes('รอเข้าเก็บ') || sLower === 'รอ') return `rgba(245, 158, 11, ${opacity})`; 
              if (sLower.includes('รอ') && sLower.includes('sub')) return `rgba(139, 92, 246, ${opacity})`; 
              if (sLower.includes('รอ') && sLower.includes('ลูกค้า')) return `rgba(236, 72, 153, ${opacity})`; 
              if (sLower.includes('รอ') && sLower.includes('เซลล์')) return `rgba(14, 165, 233, ${opacity})`; 
              if (sLower.includes('ไม่พบ') || sLower.includes('หาย')) return `rgba(239, 68, 68, ${opacity})`; 
              if (sLower.includes('ยกเลิก') || sLower.includes('cancel')) return `rgba(153, 27, 27, ${opacity})`; 
              if (sLower.includes('กำลัง') || sLower.includes('progress')) return `rgba(59, 130, 246, ${opacity})`; 
              if (sLower.includes('เลื่อน')) return `rgba(20, 184, 166, ${opacity})`; 
              const colors = [`rgba(249, 115, 22, ${opacity})`, `rgba(99, 102, 241, ${opacity})`, `rgba(132, 204, 22, ${opacity})`, `rgba(217, 70, 239, ${opacity})`, `rgba(6, 182, 212, ${opacity})`];
              let hash = 0; for (let i = 0; i < (s?.length || 0); i++) hash = s.charCodeAt(i) + ((hash << 5) - hash);
              return colors[Math.abs(hash) % colors.length];
          };
          
          const statusCounts = {};
          if (d_statusCol) dashboardFilteredTasks.forEach(t => { const s = getCleanStatus(t[d_statusCol]); statusCounts[s] = (statusCounts[s] || 0) + 1; });
          const getStatusRank = (status) => {

              if (s.includes('เก็บเรียบร้อย') || s.includes('สำเร็จ') || s.includes('complete') || s.includes('done') || s.includes('100%')) return 1;
              if (s.includes('รอเข้าเก็บ')) return 2; if (s.includes('รอลูกค้า')) return 3; if (s.includes('รอเซลล์') || s.includes('รอ sale') || s.includes('รอเซล')) return 4;
              if (s.includes('รอนัด')) return 5; if (s.includes('รอ sub') || s.includes('รอsub')) return 6; if (s.includes('รอ')) return 7;

              return 99;

          const sortedStatuses = Object.keys(statusCounts).sort((a, b) => { const rA = getStatusRank(a), rB = getStatusRank(b); return rA !== rB ? rA - rB : statusCounts[b] - statusCounts[a]; });

          const chartSortedStatuses = Object.keys(chartStatusCounts).sort((a, b) => { const rA = getStatusRank(a), rB = getStatusRank(b); return rA !== rB ? rA - rB : chartStatusCounts[b] - chartStatusCounts[a]; });
          const statusChartData = { labels: chartSortedStatuses, datasets: [{ data: chartSortedStatuses.map(s => chartStatusCounts[s]), backgroundColor: chartSortedStatuses.map(s => getStatusColor(s, 0.8)), borderColor: chartSortedStatuses.map(s => getStatusColor(s, 1)), borderWidth: 2, hoverOffset: 6, borderRadius: 4 }] };
          const statusChartOptions = { responsive: true, maintainAspectRatio: false, cutout: '75%', layout: { padding: 10 }, plugins: { legend: { display: false }, tooltip: { backgroundColor: 'rgba(15, 23, 42, 0.9)', padding: 12, cornerRadius: 8 }, datalabels: { display: false } } };

          const dlStyle = { 
              color: '#ffffff', 
              font: { weight: 'bold', size: 12, family: 'Prompt' }, 
              display: (c) => c.dataset.data[c.dataIndex] > 0,

              textStrokeWidth: 4 
          };

          // 🟢 คำนวณ % Complete รวมสำหรับ Doughnut Chart
          const totalCompletedCount = chartFilteredTasks.filter(t => getCleanStatus(t[d_statusCol]).toLowerCase().match(/(สำเร็จ|เรียบร้อย|complete|done|100%)/)).length;
          const overallPercentComplete = totalTasksCount > 0 ? Math.round((totalCompletedCount / totalTasksCount) * 100) : 0;

          let barChartData, barChartOptions, barChartTitle;
          if (dashboardView === 'subcontract') {
              barChartTitle = "สรุปจัดเก็บรายเดือน";
              const monthlyData = {}; for (let i = 1; i <= 12; i++) monthlyData[i] = { collected: 0, ongoing: 0, percent: 0 };
              chartFilteredTasks.forEach(t => {
                  const d = parseDateHelper(getDashboardTaskEffectiveDateStr(t));

              barChartOptions = { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' }, datalabels: { ...dlStyle, font: { weight: 'bold', size: 13, family: 'Prompt' } } }, scales: { y: { beginAtZero: true } } };

                  if (!yStr) yStr = 'ไม่ระบุปี';

                  if (isCollected) yearlyData[yStr].collected++; else yearlyData[yStr].ongoing++;
              });
              
              const sortedYears = Object.keys(yearlyData).sort((a, b) => {

                          <tbody className="divide-y divide-slate-200">

                            : (currentTasksTable?.length || 0) === 0 ? <tr><td colSpan={Math.max((orderedVisibleColumnsTable?.length || 0) + 1, 1)} className="p-8 text-center text-slate-500">ฐานข้อมูลว่างเปล่า</td></tr>

                                    const val = task[col] || '';

                                    const cellId = `${task.id}-${col}`;
                                    const isEditing = editingCell === cellId;
                                    
                                    let styleObj = {};
                                    
                                    if (isStatusCell) {
                                        styleObj = { backgroundColor: getStatusColor(cleanVal, 0.1), color: getStatusColor(cleanVal, 1), fontWeight: 'bold', textAlign: 'center', borderRadius: '6px' };
                                    } else if (isTeamCell) {
                                        const tColor = getTeamColorStyle(val, masterData); styleObj = { backgroundColor: tColor.bg, color: tColor.text, border: `1px solid ${tColor.border}`, fontWeight: 'bold', textAlign: 'center', borderRadius: '6px' };

                                        const yColor = getYearColorStyle(val); styleObj = { backgroundColor: yColor.bg, color: yColor.text, border: `1px solid ${yColor.border}`, fontWeight: 'bold', textAlign: 'center', borderRadius: '6px' };

                                        const currentTaskStatus = getCleanStatus(task[t_statusCol]);
                                        const cBg = getStatusColor(currentTaskStatus, 0.15);
                                        const cText = getStatusColor(currentTaskStatus, 1);
                                        styleObj = { backgroundColor: cBg, color: cText, border: `1px solid ${getStatusColor(currentTaskStatus, 0.3)}`, fontWeight: 'bold', textAlign: 'center', borderRadius: '6px' };
                                    } else if (isOverDueCell && cleanVal) {
                                        let num = NaN; const match = cleanVal.match(/-?\d+/); if(match) num = parseInt(match[0], 10);
                                        if (cleanVal.includes('เกิน') || cleanVal.includes('over') || num < 0) styleObj = { backgroundColor: '#fee2e2', color: '#991b1b', fontWeight: 'bold', textAlign: 'center', borderRadius: '6px' };
                                        else if (num === 0 || cleanVal.includes('ครบกำหนด') || cleanVal === '0') styleObj = { backgroundColor: '#fef08a', color: '#854d0e', fontWeight: 'bold', textAlign: 'center', borderRadius: '6px' };

                                    } else if (isStatusChangeCell && cleanVal !== 'ไม่ระบุสถานะ' && cleanVal !== '') {
                                        styleObj = { backgroundColor: '#fff7ed', color: '#b45309', fontWeight: '600', borderRadius: '4px', border: '1px solid #fef08a', display: 'inline-block', padding: '2px 6px' };

                                    const isPinned = (pinnedColumns || []).includes(col);
                                    const isLastPinned = isPinned && col === pinnedColsListTable?.[(pinnedColsListTable?.length || 1) - 1];

                                    if (colWidth) {
                                        tdStyle.width = colWidth;

                                            tdStyle.maxWidth = '250px';

                                    let tdOverflow = 'hidden';

                                        tdWhiteSpace = 'pre-wrap';
                                        tdWordBreak = 'break-word';
                                        tdOverflow = 'auto';

                                        tdWhiteSpace = 'normal';
                                        tdWordBreak = 'break-word';
                                        tdOverflow = 'visible';

                                    if (isGroupedMultiLine) cellClasses += ' cell-scrollbar';

                                            <td key={idx} className={tdClass} style={tdStyle}>
                                                <div className="px-2 md:px-3 py-1 text-center text-slate-600 font-semibold bg-slate-50 rounded" style={{ minHeight: '28px', lineHeight: '20px' }}>{val}</div>
                                            </td>

                                        const statusOptions = tasksSubTab === 'ns' && masterData.nsStatuses && masterData.nsStatuses.length > 0 ? masterData.nsStatuses.map(s=>s.name) : tableUniqueStatuses;

                                                            {(statusOptions || []).map(s => <option key={s} value={s}>{s}</option>)}
                                                        </select>
                                                    </div>
                                                </div>
                                            </td>
                                        );

                                        const teamOptions = tasksSubTab === 'ns'

                                            <td key={idx} className={tdClass} style={tdStyle}>

                                                    <div className="relative w-5 md:w-6 flex-shrink-0 flex items-center justify-center hover:bg-black/10 rounded-r-md cursor-pointer">
                                                        <i className="fa-solid fa-chevron-down text-[10px]"></i>
                                                        <select className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" value="" onChange={e => { if (e.target.value) handleCellChangeTable(task, col, e.target.value, currentColumnsTable); }}>
                                                            <option value="" disabled></option>
                                                            {(teamOptions || []).map(s => <option key={s} value={s}>{s}</option>)}
                                                        </select>
                                                    </div>
                                                </div>
                                            </td>
                                        );
                                    } else if (isEquipYearCell) {
                                        return (
                                            <td key={idx} className={tdClass} style={tdStyle}>
                                                <div className="flex items-stretch w-full transition-colors mx-auto relative" style={styleObj}>
                                                    <div contentEditable={isEditing} suppressContentEditableWarning={true} className={`flex-1 px-2 md:px-3 py-1 outline-none text-center editable-cell ${isEditing ? 'editing text-slate-800' : ''}`} style={{ minHeight: '28px', lineHeight: '20px', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }} onDoubleClick={(e) => handleCellDoubleClick(e, cellId)} onBlur={e => { handleCellChangeTable(task, col, e.target.innerText, currentColumnsTable).then(res=>{ if(res===false) e.target.innerText = val; }); setEditingCell(null); }}>{val}</div>
                                                    <div className="relative w-5 md:w-6 flex-shrink-0 flex items-center justify-center hover:bg-black/10 rounded-r-md cursor-pointer">
                                                        <i className="fa-solid fa-chevron-down text-[10px]"></i>
                                                        <select className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" value="" onChange={e => { if (e.target.value) handleCellChangeTable(task, col, e.target.value, currentColumnsTable); }}>
                                                            <option value="" disabled></option>
                                                            {(tableUniqueYears || []).map(y => <option key={y} value={y}>{y}</option>)}
                                                        </select>
                                                    </div>
                                                </div>
                                            </td>
                                        );
                                    } else {
                                        return (
                                            <td key={idx} className={tdClass} style={tdStyle}>
                                                <div contentEditable={isEditing} suppressContentEditableWarning={true} className={cellClasses} style={{ ...styleObj, minHeight: '28px', cursor: isEditing ? 'text' : 'pointer', whiteSpace: tdWhiteSpace, wordBreak: tdWordBreak, textAlign: textAlignment, lineHeight: isGroupedMultiLine ? '1.8' : '20px', overflow: tdOverflow, textOverflow: isGroupedMultiLine ? 'clip' : 'ellipsis', maxHeight: isGroupedMultiLine ? '120px' : 'none' }} onDoubleClick={(e) => handleCellDoubleClick(e, cellId)} onBlur={e => { handleCellChangeTable(task, col, e.target.innerText, currentColumnsTable).then(res=>{ if(res===false) e.target.innerText = val; }); setEditingCell(null); }}>{val}</div>
                                            </td>
                                        );
                                    }
                                })}
                                
                                <td className="p-1 align-middle border-l border-slate-200 bg-slate-50 sticky right-0 z-10 text-center shadow-[-4px_0_6px_-1px_rgba(0,0,0,0.05)]">
                                    <div className="flex flex-col gap-1.5 h-full justify-center px-1">
                                        {tasksSubTab === 'ns' && (
                                            <button onClick={() => handleDirectAssign(task[t_cidCol], task[siteTypeColMatch])} className="w-full py-1.5 bg-indigo-50 border border-indigo-200 text-indigo-700 hover:bg-indigo-600 hover:text-white hover:border-indigo-600 rounded text-[10px] font-bold transition-all shadow-sm flex items-center justify-center gap-1" title="ส่ง CID นี้ไปหน้าจ่ายงาน">
                                                <i className="fa-solid fa-bolt"></i> จ่ายงาน
                                            </button>
                                        )}

                                            <button onClick={() => handleDeleteTask(task)} className="w-full py-1.5 bg-red-50 border border-red-200 text-red-600 hover:bg-red-600 hover:text-white hover:border-red-600 rounded text-[10px] font-bold transition-all shadow-sm flex items-center justify-center gap-1" title="ลบข้อมูลแถวนี้">
                                                <i className="fa-solid fa-trash"></i> ลบ
                                            </button>
                                        )}
                                    </div>
                                </td>
                              </tr>
                            ))}

                      {/* Pagination UI */}
                      <div className="shrink-0 bg-slate-50 border-t border-slate-200 p-2 md:p-3 px-3 md:px-5 flex flex-col sm:flex-row items-center justify-between z-20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] gap-3">
                          <div className="text-xs md:text-sm font-semibold text-blue-700 flex items-center gap-2 bg-blue-100 px-3 py-1.5 rounded-lg border border-blue-200 shadow-sm w-full sm:w-auto justify-center"><i className="fa-solid fa-list-check"></i>แสดงผลทั้งหมด {finalTableTasks?.length || 0} รายการ</div>
                          
                          <div className="flex items-center justify-between w-full sm:w-auto gap-4">
                              <div className="flex items-center gap-2">
                                  <span className="text-xs text-slate-500">แสดงหน้าละ:</span>
                                  <select 
                                      value={rowsPerPage} 
                                      onChange={(e) => { setRowsPerPage(e.target.value === 'All' ? 'All' : Number(e.target.value)); setCurrentPage(1); }}
                                      className="border border-slate-300 rounded px-2 py-1 text-xs text-slate-700 bg-white outline-none focus:border-blue-500 cursor-pointer shadow-sm"
                                  >
                                      <option value={20}>20</option>
                                      <option value={50}>50</option>
                                      <option value={100}>100</option>
                                      <option value="All">ทั้งหมด</option>
                                  </select>
                              </div>
                              
                              {totalPages > 1 && (
                                  <div className="flex items-center gap-2">
                                      <span className="text-xs text-slate-500 hidden sm:block mr-2">หน้า {currentPage} จาก {totalPages}</span>
                                      <button onClick={() => setCurrentPage(p => Math.max(1, p - 1))} disabled={currentPage === 1} className="px-3 py-1 bg-white border border-slate-300 text-slate-600 hover:bg-slate-50 rounded-md text-xs font-semibold disabled:opacity-50 transition-colors"><i className="fa-solid fa-chevron-left sm:mr-1"></i><span className="hidden sm:inline"> ก่อนหน้า</span></button>
                                      <button onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))} disabled={currentPage === totalPages} className="px-3 py-1 bg-white border border-slate-300 text-slate-600 hover:bg-slate-50 rounded-md text-xs font-semibold disabled:opacity-50 transition-colors"><span className="hidden sm:inline">ถัดไป </span><i className="fa-solid fa-chevron-right sm:ml-1"></i></button>
                                  </div>
                              )}
                          </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* --- 3. หน้าปฏิทิน --- */}
                {activeTab === 'calendar' && (
                  <div className="absolute inset-0 flex flex-col p-2 md:p-4 lg:p-6 overflow-hidden bg-slate-50 min-h-0">
                    <header className="shrink-0 flex flex-col md:flex-row justify-between items-start md:items-end gap-4 mb-4">
                      <div className="flex items-center gap-3">
                        <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 bg-white border border-slate-200 shadow-sm rounded-lg hover:bg-slate-50 text-slate-600 transition-colors hidden lg:block">
                            <i className="fa-solid fa-bars"></i>
                        </button>
                        <div>
                            <h2 className="text-xl md:text-3xl font-bold text-slate-900">ปฏิทิน (Calendar)</h2>
                            <p className="text-xs md:text-sm text-slate-500 mt-1">ข้อมูลจะดึงมาจากตารางงานอัตโนมัติ ชี้ที่นัดหมายเพื่อดูรายละเอียด</p>
                        </div>
                      </div>
                      <div className="flex flex-col items-end gap-3 w-full md:w-auto">
                        <div className="flex bg-slate-200 p-1 rounded-lg w-full sm:w-auto">
                          <button onClick={() => setCalendarView('day')} className={`flex-1 sm:flex-none px-3 md:px-4 py-1.5 text-xs md:text-sm font-semibold rounded-md ${calendarView === 'day' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-600'}`}>รายวัน</button>
                          <button onClick={() => setCalendarView('week')} className={`flex-1 sm:flex-none px-3 md:px-4 py-1.5 text-xs md:text-sm font-semibold rounded-md ${calendarView === 'week' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-600'}`}>สัปดาห์</button>
                          <button onClick={() => setCalendarView('month')} className={`flex-1 sm:flex-none px-3 md:px-4 py-1.5 text-xs md:text-sm font-semibold rounded-md ${calendarView === 'month' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-600'}`}>เดือน</button>
                        </div>
                        <div className="flex items-center justify-between w-full md:w-auto gap-4">
                          <h3 className="text-base md:text-xl font-bold text-blue-700 min-w-[140px] md:min-w-[180px] text-left md:text-right">
                            {calendarView === 'month' && `${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`}
                            {calendarView === 'week' && `สัปดาห์ที่ ${currentDate.getDate()} ${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`}
                            {calendarView === 'day' && `${currentDate.getDate()} ${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`}
                          </h3>
                          <div className="flex gap-1 shrink-0">
                            <button onClick={() => navigateCalendar(-1)} className="p-1.5 md:p-2 bg-white border rounded-lg hover:bg-slate-50"><i className="fa-solid fa-chevron-left text-xs md:text-base"></i></button>
                            <button onClick={() => setCurrentDate(new Date())} className="px-2 md:px-3 bg-white border rounded-lg hover:bg-slate-50 text-xs md:text-sm font-bold">วันนี้</button>
                            <button onClick={() => navigateCalendar(1)} className="p-1.5 md:p-2 bg-white border rounded-lg hover:bg-slate-50"><i className="fa-solid fa-chevron-right text-xs md:text-base"></i></button>
                          </div>
                        </div>
                      </div>
                    </header>

                    <div className="flex-1 flex flex-col min-h-0 overflow-hidden">
                      {calendarView === 'month' && (
                        <div className="flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col min-h-0 overflow-hidden">
                          <div className="grid grid-cols-7 border-l border-t border-slate-200 shrink-0 bg-slate-50 z-10">
                            {['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'].map((d, i) => (
                              <div key={d} className="py-2 md:py-3 text-center text-xs md:text-sm font-semibold text-slate-600 border-r border-b border-slate-200">
                                  <span className="md:hidden">{d}</span>
                                  <span className="hidden md:inline">{['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'][i]}</span>
                              </div>
                            ))}
                          </div>
                          <div className="flex-1 overflow-y-auto custom-scrollbar">
                              <div className="grid grid-cols-7 border-l border-slate-200 h-full min-h-[500px] auto-rows-fr">
                                {(monthSlots || []).map((dateObj, idx) => {
                                  const dayTasks = getTasksForDateObj(dateObj);
                                  return (
                                    <div key={idx} className="bg-white p-1 md:p-2 flex flex-col border-r border-b border-slate-200 group hover:bg-slate-50/50 transition-colors h-full overflow-hidden min-h-[100px]">
                                      {dateObj && (
                                        <>
                                          <div className="text-right mb-0.5 md:mb-1 shrink-0">
                                            <span 
                                              onClick={() => { setCalendarView('day'); setCurrentDate(dateObj); }}
                                              title="คลิกเพื่อดูรายละเอียดรายวัน"
                                              className={`inline-block w-6 h-6 md:w-7 md:h-7 leading-6 md:leading-7 text-center rounded-full text-xs md:text-sm font-semibold cursor-pointer hover:scale-110 ${dateObj.getDate() === new Date().getDate() && dateObj.getMonth() === new Date().getMonth() ? 'bg-blue-600 text-white shadow-md' : 'text-slate-700 bg-slate-100 group-hover:bg-blue-100 group-hover:text-blue-700 transition-all'}`}
                                            >
                                              {dateObj.getDate()}
                                            </span>
                                          </div>
                                          <div className="flex-1 overflow-y-auto custom-scrollbar pr-1 space-y-1 md:space-y-1.5 min-h-0">
                                            {(dayTasks || []).map(t => {
                                                const border = getStatusColor(t._calStatusCol ? t[t._calStatusCol] : '', 1);
                                                const softBg = getStatusColor(t._calStatusCol ? t[t._calStatusCol] : '', 0.1);
                                                const colDate = t._calDateCol ? t[t._calDateCol] : '-';
                                                const colTime = t._calTimeCol ? t[t._calTimeCol] : '-';
                                                
                                                return (
                                                  <div key={t.id} style={{borderLeftColor: border}} className="p-1.5 md:p-2 rounded-lg md:rounded-xl border border-l-2 md:border-l-4 shadow-sm bg-white text-[9px] md:text-xs space-y-1 cursor-pointer hover:shadow-md transition-shadow" onMouseMove={(e) => handleMouseMove(e, t)} onMouseLeave={handleMouseLeave} onClick={() => { if(window.innerWidth <= 1024) { setCalendarView('day'); setCurrentDate(dateObj); } }}>
                                                    {/* ทีม */}
                                                    <div className="text-slate-500 font-semibold truncate mb-0.5 text-[8px] md:text-[10px]">ทีม: {t._calTeamCol ? t[t._calTeamCol] : '-'}</div>
                                                    
                                                    {/* บริษัทลูกค้า */}
                                                    <div className="font-bold text-slate-800 leading-tight line-clamp-2" title={t._calCompCol ? t[t._calCompCol] : 'ไม่ระบุชื่อ'}>{t._calCompCol ? t[t._calCompCol] : 'ไม่ระบุชื่อ'}</div>
                                                    
                                                    {/* วันที่และเวลา */}
                                                    <div className="flex items-center gap-1 text-slate-600 font-medium text-[8px] md:text-[10px] mt-0.5 flex-wrap">
                                                        <i className="fa-regular fa-calendar-check"></i> {colDate} 
                                                        {colTime !== '-' && <><i className="fa-regular fa-clock ml-0.5"></i> {colTime}</>}
                                                    </div>
                                                    
                                                    {/* Status */}
                                                    <div className="mt-1 text-center font-bold px-1 py-0.5 rounded border text-[8px] md:text-[10px] truncate" style={{backgroundColor: softBg, color: border, borderColor: border}}>
                                                        {t._calStatusCol ? t[t._calStatusCol] : 'ไม่มีสถานะ'}
                                                    </div>
                                                  </div>
                                                );
                                            })}
                                          </div>
                                        </>
                                      )}
                                    </div>
                                  );
                                })}
                              </div>
                          </div>
                        </div>
                      )}

                      {calendarView === 'week' && (
                        <div className="flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col min-h-0 overflow-hidden">
                          <div className="grid grid-cols-7 border-l border-t border-slate-200 shrink-0 bg-slate-50 z-10">
                            {(weekSlots || []).map((dateObj, idx) => (
                              <div key={idx} className="py-2 md:py-3 text-center border-r border-b border-slate-200">
                                <div className="text-[10px] md:text-sm font-semibold text-slate-500">
                                    <span className="md:hidden">{['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'][dateObj.getDay()]}</span>
                                    <span className="hidden md:inline">{['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'][dateObj.getDay()]}</span>
                                </div>
                                <div 
                                  onClick={() => { setCalendarView('day'); setCurrentDate(dateObj); }}
                                  title="คลิกเพื่อดูรายละเอียดรายวัน"
                                  className={`text-base md:text-2xl font-bold mt-1 cursor-pointer transition-colors inline-block px-2 md:px-3 py-0.5 md:py-1 rounded-lg hover:bg-blue-100 hover:text-blue-700 ${dateObj.getDate() === new Date().getDate() && dateObj.getMonth() === new Date().getMonth() ? 'text-blue-600' : 'text-slate-800'}`}
                                >
                                  {dateObj.getDate()}
                                </div>
                              </div>
                            ))}
                          </div>
                          <div className="flex-1 overflow-y-auto custom-scrollbar">
                            <div className="grid grid-cols-7 border-l border-slate-200 h-full min-h-[400px]">
                                {(weekSlots || []).map((dateObj, idx) => {
                                  const dayTasks = getTasksForDateObj(dateObj);
                                  return (
                                    <div key={`w-${idx}`} className="bg-white p-1 md:p-2 flex flex-col gap-1.5 md:gap-2 bg-slate-50/30 border-r border-b border-slate-200 h-full overflow-hidden min-h-0">
                                        <div className="flex-1 overflow-y-auto custom-scrollbar pr-1 space-y-1.5 min-h-0">
                                            {(dayTasks || []).map(t => {
                                                const border = getStatusColor(t._calStatusCol ? t[t._calStatusCol] : '', 1);
                                                const softBg = getStatusColor(t._calStatusCol ? t[t._calStatusCol] : '', 0.1);
                                                
                                                const colDate = t._calDateCol ? t[t._calDateCol] : '-';
                                                const colTime = t._calTimeCol ? t[t._calTimeCol] : '-';

                                                return (
                                                  <div key={t.id} style={{borderLeftColor: border}} className="p-1.5 md:p-3 rounded-lg md:rounded-xl border border-l-2 md:border-l-4 shadow-sm bg-white text-[10px] md:text-xs space-y-1 md:space-y-1.5 cursor-pointer hover:shadow-md transition-shadow" onMouseMove={(e) => handleMouseMove(e, t)} onMouseLeave={handleMouseLeave} onClick={() => { if(window.innerWidth <= 1024) { setCalendarView('day'); setCurrentDate(dateObj); } }}>
                                                    {/* 1. ทีมงาน */}
                                                    <div className="text-slate-500 font-semibold truncate mb-0.5">ทีม: {t._calTeamCol ? t[t._calTeamCol] : '-'}</div>
                                                    
                                                    {/* 2. ชื่อบริษัทลูกค้า */}
                                                    <div className="font-bold text-slate-800 break-words leading-tight line-clamp-2">{t._calCompCol ? t[t._calCompCol] : 'ไม่ระบุชื่อ'}</div>
                                                    
                                                    {/* 3. วันและเวลาที่เข้าเก็บ */}
                                                    <div className="flex items-center gap-1 text-slate-600 font-medium px-1 py-0.5 rounded text-[8px] md:text-[10px] w-fit mt-1">
                                                        <i className="fa-regular fa-calendar-check"></i> {colDate} <i className="fa-regular fa-clock ml-0.5"></i> {colTime}
                                                    </div>
                                                    
                                                    {/* 4. Status */}
                                                    <div className="mt-1.5 text-center font-bold px-1 md:px-2 py-0.5 md:py-1 rounded-md md:rounded-lg border text-[8px] md:text-[10px]" style={{backgroundColor: softBg, color: border, borderColor: border}}>{t._calStatusCol ? t[t._calStatusCol] : 'ไม่มีสถานะ'}</div>
                                                  </div>
                                                )
                                            })}
                                        </div>
                                    </div>
                                  );
                                })}
                            </div>
                          </div>
                        </div>
                      )}

                      {calendarView === 'day' && (() => {
                        const dayTasks = getTasksForDateObj(currentDate);
                        return (
                          <div className="flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col p-4 md:p-6 min-h-0 overflow-hidden">
                            <h4 className="text-base md:text-lg font-bold text-slate-800 mb-4 md:mb-6 border-b pb-3 md:pb-4 flex justify-between items-center shrink-0">
                              <span><i className="fa-regular fa-calendar-check text-blue-600 mr-2"></i> ตารางงานประจำวัน</span>
                              <span className="text-xs md:text-sm font-medium bg-blue-50 text-blue-700 px-3 md:px-4 py-1 md:py-1.5 rounded-full shadow-sm">{(dayTasks || []).length} งาน</span>
                            </h4>
                            <div className="flex-1 overflow-y-auto custom-scrollbar pr-2">
                                {(dayTasks || []).length === 0 ? (
                                  <div className="text-center text-slate-400 py-12 md:py-20 flex flex-col items-center">
                                      <i className="fa-regular fa-calendar-xmark text-4xl md:text-6xl mb-3 md:mb-4 text-slate-200"></i>
                                      <p className="text-sm md:text-lg font-medium">ไม่มีงานที่ต้องดำเนินการในวันนี้</p>
                                  </div>
                                ) : (
                                  <div className="space-y-3 md:space-y-4">
                                    {(dayTasks || []).map(t => {
                                        const bgColor = getStatusColor(t._calStatusCol ? t[t._calStatusCol] : '', 1);
                                        const softBg = getStatusColor(t._calStatusCol ? t[t._calStatusCol] : '', 0.1);
                                        
                                        const cidVal = t._calCidCol ? t[t._calCidCol] : '';
                                        const companyVal = t._calCompCol ? t[t._calCompCol] : '-';
                                        
                                        const contactVal = (t._calContactCol && t[t._calContactCol]) ? t[t._calContactCol] : 'ไม่ระบุ';
                                        const phoneVal = (t._calPhoneCol && t[t._calPhoneCol]) ? t[t._calPhoneCol] : '';
                                        
                                        const collectionDateVal = t._calDateCol ? t[t._calDateCol] : '-';
                                        const collectionTimeVal = t._calTimeCol ? t[t._calTimeCol] : '-';
                                        
                                        return (
                                          <div key={t.id} className="flex bg-white rounded-xl md:rounded-2xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition-shadow cursor-pointer relative" onMouseMove={(e) => handleMouseMove(e, t)} onMouseLeave={handleMouseLeave}>
                                            <div style={{backgroundColor: bgColor}} className="w-2 md:w-3 shrink-0"></div>
                                            
                                            <div className="p-3 md:p-4 flex-1 flex flex-col text-xs md:text-sm min-w-0">
                                                <div className="flex flex-col lg:flex-row gap-3 md:gap-4 lg:items-center w-full min-w-0">
                                                    
                                                    {/* กลุ่มข้อมูลด้านซ้าย */}
                                                    <div className="flex-1 flex flex-col lg:flex-row gap-3 lg:gap-4 lg:items-center min-w-0">
                                                        
                                                        {/* 1. ทีมงาน */}
                                                        <div className="flex flex-col justify-center items-start shrink-0 lg:pr-4 lg:border-r border-slate-200">
                                                            <p className="text-[10px] md:text-xs text-slate-400 font-semibold uppercase tracking-wider mb-1">ทีมงาน</p>
                                                            <div className="px-2 py-1 md:py-1.5 rounded-md text-sm md:text-base font-bold border w-24 md:w-32 text-center truncate shadow-sm" style={{ backgroundColor: getTeamColorStyle(t._calTeamCol ? t[t._calTeamCol] : '').bg, color: getTeamColorStyle(t._calTeamCol ? t[t._calTeamCol] : '').text, borderColor: getTeamColorStyle(t._calTeamCol ? t[t._calTeamCol] : '').border }} title={t._calTeamCol ? t[t._calTeamCol] : 'ไม่ระบุทีม'}>
                                                                {t._calTeamCol ? t[t._calTeamCol] : 'ไม่ระบุทีม'}
                                                            </div>
                                                        </div>

                                                        {/* 2. บริษัทลูกค้า + CID */}
                                                        <div className="flex-1 flex flex-col justify-center overflow-hidden min-w-0 lg:pr-2">
                                                            <p className="text-[10px] md:text-xs text-slate-400 font-semibold uppercase tracking-wider">CID / บริษัทลูกค้า</p>
                                                            <p className="font-bold text-slate-800 text-sm md:text-base leading-tight truncate mt-0.5" title={`${cidVal ? '['+cidVal+'] ' : ''}${companyVal}`}>
                                                                {cidVal && <span className="text-blue-600 mr-1">[{cidVal}]</span>}
                                                                <span>{companyVal}</span>
                                                            </p>
                                                        </div>

                                                        {/* 3 & 4. ผู้ประสานงาน และ เข้าเก็บ */}
                                                        <div className="flex flex-col sm:flex-row gap-3 sm:gap-6 shrink-0 lg:pl-2">
                                                            {/* 3. ผู้ประสานงาน */}
                                                            <div className="flex flex-col justify-center sm:w-40 lg:w-56">
                                                                <p className="text-[10px] md:text-xs text-slate-400 font-semibold uppercase tracking-wider">ผู้ประสานงาน / เบอร์โทร</p>
                                                                <p className="text-slate-700 break-words font-medium mt-0.5">{contactVal}</p>
                                                                {phoneVal && contactVal !== phoneVal && <p className="text-slate-500 text-xs mt-0.5 break-words"><i className="fa-solid fa-phone text-[10px]"></i> {phoneVal}</p>}
                                                            </div>

                                                            {/* 4. วันและเวลาที่เข้าเก็บ */}
                                                            <div className="flex flex-col justify-center shrink-0">
                                                                <p className="text-[10px] md:text-xs text-slate-400 font-semibold uppercase tracking-wider">เข้าเก็บ (วัน-เวลา)</p>
                                                                <div className="flex items-center gap-2 mt-0.5 text-sm md:text-base font-bold text-slate-700">
                                                                    <p>{collectionDateVal}</p>
                                                                    {collectionTimeVal !== '-' && (
                                                                        <p><i className="fa-regular fa-clock mr-1 text-slate-500 text-sm"></i>{collectionTimeVal}</p>
                                                                    )}
                                                                </div>
                                                            </div>
                                                        </div>
                                                        
                                                    </div>

                                                    {/* 5. Status (อัปเดตจากปฏิทินได้) */}
                                                    <div className="flex justify-start lg:justify-end mt-2 lg:mt-0 shrink-0 border-t lg:border-t-0 lg:border-l border-slate-200 pt-3 lg:pt-0 lg:pl-4 relative">
                                                        <div style={{backgroundColor: softBg, color: bgColor, borderColor: bgColor}} className="font-bold px-4 md:px-6 py-1.5 md:py-2 rounded-lg md:rounded-xl border-2 text-center min-w-[120px] md:min-w-[140px] shadow-sm relative flex items-center justify-between cursor-pointer hover:opacity-80 transition-opacity">
                                                            <span className="flex-1 text-center">{t._calStatusCol ? t[t._calStatusCol] : 'ไม่มีสถานะ'}</span>
                                                            <i className="fa-solid fa-chevron-down text-[10px] ml-2"></i>
                                                            <select className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" value="" onChange={e => { if (e.target.value) handleCellChangeTable(t, t._calStatusCol, e.target.value, currentColumnsTable); }}>
                                                                <option value="" disabled></option>
                                                                {(masterData.nsStatuses && masterData.nsStatuses.length > 0 ? masterData.nsStatuses.map(s=>s.name) : tableUniqueStatuses || []).map(s => <option key={s} value={s}>{s}</option>)}
                                                            </select>
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* 6. หมายเหตุเพิ่มเติม */}
                                                {t._calNoteCol && t[t._calNoteCol] && (
                                                    <div className="mt-3 pt-3 border-t border-slate-100 w-full">
                                                        <p className="text-[10px] md:text-xs text-amber-600 font-semibold uppercase tracking-wider">หมายเหตุเพิ่มเติม</p>
                                                        <p className="text-slate-600 text-xs mt-0.5 break-words">{t[t._calNoteCol]}</p>
                                                    </div>
                                                )}
                                            </div>
                                          </div>
                                        )
                                    })}
                                  </div>
                                )}
                            </div>
                          </div>
                        );
                      })()}
                    </div>
                  </div>
                )}

                {/* --- 4. หน้า MASTER DATA --- */}
                {activeTab === 'master_data' && <MasterDataTab masterData={masterData} masterDataRef={masterDataRef} customAlert={customAlert} customConfirm={customConfirm} />}

                {/* --- 5. หน้า ASSIGN JOB --- */}
                {activeTab === 'assign' && <AssignJobTab masterData={masterData} queueState={queueState} setQueueState={setQueueState} masterDataRef={masterDataRef} collectionRef={collectionRef} GAS_WEB_APP_URL={GAS_WEB_APP_URL} nsTasks={nsTasks} autoAssignData={autoAssignData} clearAutoAssignData={clearAutoAssignData} customAlert={customAlert} />}

              </main>

              {/* Tooltip Component */}
              {tooltipData.visible && tooltipData.task && (
                <div className="fixed z-[9999] bg-white p-4 md:p-5 rounded-xl shadow-2xl border border-slate-200 w-[280px] md:w-80 pointer-events-none transition-opacity duration-150" style={{ left: tooltipData.x, top: tooltipData.y }}>
                    <div className="flex justify-between items-start mb-3 border-b pb-2">
                        <h4 className="font-bold text-slate-800 text-sm break-words pr-2">
                            {tooltipData.task._calCompCol ? tooltipData.task[tooltipData.task._calCompCol] : tooltipData.task[t_getCol(['บริษัท', 'ลูกค้า', 'site', 'องค์กร', 'ชื่อ', 'company'])] || 'ไม่ระบุองค์กร'}
                        </h4>
                    </div>
                    <div className="space-y-2 text-[11px] md:text-xs text-slate-600 max-h-[250px] overflow-y-auto pr-1 table-container">
                        {(currentColumnsTable || []).map(col => {
                            if (skipColsInTooltip.includes(col)) return null;
                            const val = tooltipData.task[col]; if (!val || String(val).trim() === '') return null;
                            return (<div key={col} className="flex flex-col"><span className="font-semibold text-[9px] text-slate-400 uppercase">{col}</span><span className="text-slate-800 font-medium">{val}</span></div>)
                        })}
                    </div>
                </div>
              )}

              {/* History Modal */}
              {showHistoryModal && (
                  <div className="fixed inset-0 z-[1000] flex items-center justify-center bg-slate-900/60 p-4 animate-fade-in">
                      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[85vh] flex flex-col overflow-hidden">
                          <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50 shrink-0">
                              <h2 className="text-lg font-bold text-slate-800"><i className="fa-solid fa-clock-rotate-left text-indigo-600 mr-2"></i> ประวัติการแก้ไขข้อมูล (ล่าสุด 50 รายการ)</h2>
                              <button onClick={() => setShowHistoryModal(false)} className="w-8 h-8 flex justify-center items-center rounded-full bg-white hover:bg-slate-200 text-slate-500 shadow-sm border transition-colors"><i className="fa-solid fa-xmark"></i></button>
                          </div>
                          <div className="flex-1 overflow-y-auto p-4 bg-slate-100/50">
                              {(historyLogs || []).length === 0 ? (
                                  <div className="text-center py-10 text-slate-400"><i className="fa-regular fa-folder-open text-4xl mb-3"></i><p>ยังไม่มีประวัติการแก้ไขข้อมูล</p></div>
                              ) : (
                                  <div className="space-y-3">
                                      {(historyLogs || []).map(log => {
                                          const dateStr = log.updatedAt ? new Date(log.updatedAt.toDate()).toLocaleString('th-TH') : 'กำลังบันทึก...';
                                          return (
                                              <div key={log.id} className="bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex flex-col md:flex-row md:items-center gap-3">
                                                  <div className="w-full md:w-1/4 shrink-0 border-r border-slate-100">
                                                      <p className="text-[10px] text-slate-400 font-bold uppercase"><i className="fa-regular fa-clock"></i> {dateStr}</p>
                                                      <p className="text-xs font-bold text-slate-700 mt-1 line-clamp-1">{log.company}</p>
                                                  </div>
                                                  <div className="flex-1 flex flex-col sm:flex-row items-start sm:items-center gap-2 sm:gap-4 text-sm">
                                                      <span className="bg-slate-100 text-slate-600 px-2 py-1 rounded text-xs font-semibold shrink-0">คอลัมน์: {log.field}</span>
                                                      <div className="flex items-center gap-2 w-full">
                                                          <span className="line-through text-red-500 bg-red-50 px-2 py-0.5 rounded truncate max-w-[150px]" title={log.oldValue}>{log.oldValue || '-ว่าง-'}</span>
                                                          <i className="fa-solid fa-arrow-right-long text-slate-300 shrink-0"></i>
                                                          <span className="text-emerald-600 font-bold bg-emerald-50 px-2 py-0.5 rounded truncate flex-1" title={log.newValue}>{log.newValue || '-ว่าง-'}</span>
                                                      </div>
                                                  </div>
                                              </div>
                                          )
                                      })}
                                  </div>
                              )}
                          </div>
                      </div>
                  </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
