```html
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Equipment Collection Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <!-- Chart.js และ DataLabels -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>

    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; overflow: hidden; }
        #root { height: 100%; }
        
        .table-container::-webkit-scrollbar { height: 8px; width: 8px; }
        .table-container::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .cell-scrollbar::-webkit-scrollbar { width: 4px; }
        .cell-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .cell-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .cell-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .editable-cell {
            width: 100%; background: transparent; border: 1px solid transparent; padding: 4px 8px;
            border-radius: 4px; outline: none; transition: all 0.2s; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; display: block; cursor: pointer;
        }
        .editable-cell:hover { border-color: #e2e8f0; background: #f8fafc; }
        .editable-cell.editing { border-color: #3b82f6; background: #ffffff; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); cursor: text; }
        
        .th-content { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 16px; }
        .sortable-header { cursor: pointer; transition: background 0.2s; position: relative; }
        .sortable-header:hover { background-color: #334155 !important; }

        .line-preview {
            background-color: #84A98C;
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
        }
        .line-bubble {
            background-color: #ffffff; border-radius: 18px; position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .line-bubble::after {
            content: ''; position: absolute; left: -8px; top: 12px;
            border-style: solid; border-width: 6px 10px 6px 0; border-color: transparent #ffffff transparent transparent;
        }

        .sticky-col-header { position: sticky; z-index: 50; outline: 1px solid #334155; }
        .sticky-col-cell { position: sticky; z-index: 20; background-color: #ffffff; outline: 1px solid #e2e8f0; }
        tr:hover .sticky-col-cell { background-color: #f8fafc; }
        
        /* Animation classes */
        @keyframes slideInDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-in-down { animation: slideInDown 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // APP VERSION: v2.2.0 (Realtime Restored & Lag Fixed)
        // ==========================================
        const APP_VERSION = "2.2.0";

        if (typeof ChartDataLabels !== 'undefined') {
            Chart.register(ChartDataLabels);
        }

        const { useState, useEffect, useRef, useMemo, useTransition } = React;

        // Error Boundary เพื่อป้องกันหน้าจอขาว
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error("React Error Boundary Caught:", error, errorInfo);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="flex flex-col items-center justify-center w-full h-screen bg-slate-50 p-8 text-center">
                            <i className="fa-solid fa-triangle-exclamation text-6xl text-red-500 mb-4"></i>
                            <h2 className="text-2xl font-bold text-slate-800 mb-2">เกิดข้อผิดพลาดในการแสดงผล (ระบบขัดข้อง)</h2>
                            <p className="text-slate-500 mb-6 max-w-lg break-words text-sm border p-4 bg-white rounded-lg shadow-inner">
                                {this.state.error && this.state.error.toString()}
                            </p>
                            <button 
                                onClick={() => window.location.reload()} 
                                className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition-colors shadow-md">
                                <i className="fa-solid fa-rotate-right mr-2"></i> รีเฟรชหน้าเว็บ
                            </button>
                        </div>
                    );
                }
                return this.props.children; 
            }
        }

        // ==========================================
        // 1. Global Setup & Firebase Config
        // ==========================================
        const firebaseConfig = {
            apiKey: "YOUR_FIREBASE_API_KEY",
            authDomain: "test-remove-equipment.firebaseapp.com",
            projectId: "test-remove-equipment",
            storageBucket: "test-remove-equipment.firebasestorage.app",
            messagingSenderId: "822143014604",
            appId: "1:822143014604:web:1c86c25ec9541059371469",
            measurementId: "G-VB3VDMQ9D1"
        };
        
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwIf_5Ps8MMNLHPXFdCK4ZjgKx232EguXInCDLyiJFx_GN88X4PObxsiWetG4GhURnZ/exec"; 

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        db.settings({ experimentalForceLongPolling: true, useFetchStreams: false });

        db.enablePersistence().catch(function(err) {
            console.warn("Firebase Persistence Error:", err.code);
        });

        const collectionRef = db.collection('tasks');
        const nsCollectionRef = db.collection('ns_tasks'); 
        const historyRef = db.collection('task_history');
        const masterDataRef = db.collection('master_data').doc('zones_teams');

        const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        const defaultMasterData = {
            zones: [
                { id: "zone_1", name: "โซน 1 (กทม. เหนือ/กลาง/นนทบุรี)", districts: "เขตพระนคร,เขตดุสิต,เขตบางซื่อ,เขตจตุจักร,เขตพญาไท,เมืองนนทบุรี,ปากเกร็ด", teams: "BA,TAS" },
                { id: "zone_2", name: "โซน 2 (กทม. ตะวันออก/ปทุมธานี)", districts: "เขตบางกะปิ,เขตมีนบุรี,เขตลาดกระบัง,คลองหลวง,ธัญบุรี,ลำลูกกา", teams: "ATG,NPY" },
                { id: "zone_3", name: "โซน 3 (กทม. ใต้/สมุทรปราการ)", districts: "เขตบางนา,เขตพระโขนง,เขตคลองเตย,เมืองสมุทรปราการ,บางพลี,พระประแดง", teams: "JEKLINK,TP" },
                { id: "zone_4", name: "โซน 4 (กทม. ธนบุรี/ตะวันตก)", districts: "เขตธนบุรี,เขตบางกอกน้อย,เขตบางแค,บางใหญ่,บางบัวทอง,บางกรวย", teams: "JJ&A,SYMC" }
            ],
            teams: ["BA", "TAS", "ATG", "NPY", "JEKLINK", "TP", "JJ&A", "SYMC"]
        };

        // --- Helper Functions ---
        const formatSheetDate = (val) => {
            if (typeof val !== 'string') return val;
            const isLongDate = val.match(/^[A-Z][a-z]{2} [A-Z][a-z]{2} \d{2} \d{4}/) || val.match(/^\d{4}-\d{2}-\d{2}T/);
            if (isLongDate) {
                const d = new Date(val);
                if (!isNaN(d.getTime())) {
                    if (d.getFullYear() === 1899) {
                        let h = d.getUTCHours() + 7;
                        if (h >= 24) h -= 24;
                        let m = d.getUTCMinutes();
                        return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
                    }
                    return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
                }
            }
            return val;
        };

        const parseDateHelper = (dateStr) => {
            if (!dateStr || typeof dateStr !== 'string') return null;
            let str = dateStr.trim().split(/[\sT]+/)[0]; 
            if (!str) return null;
            let match = str.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{2,4})$/);
            if (match) {
                let d = parseInt(match[1], 10);
                let m = parseInt(match[2], 10);
                let y = parseInt(match[3], 10);
                if (y < 100) { y += (y > 40 ? 2500 : 2000); }
                if (y > 2500) y -= 543;
                if (m > 12 && d <= 12) [d, m] = [m, d];
                return new Date(y, m - 1, d);
            }
            match = str.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})$/);
            if (match) {
                let y = parseInt(match[1], 10);
                let m = parseInt(match[2], 10);
                let d = parseInt(match[3], 10);
                if (y > 2500) y -= 543;
                return new Date(y, m - 1, d);
            }
            const dObj = new Date(str);
            if (!isNaN(dObj.getTime())) return dObj;
            return null;
        };

        const hexToRgbA = (hex, alpha) => {
            if (!hex || !hex.startsWith('#')) return hex;
            let c = hex.substring(1).split('');
            if (c.length === 3) c = [c[0], c[0], c[1], c[1], c[2], c[2]];
            if (c.length !== 6) return hex;
            let r = parseInt(c.slice(0, 2).join(''), 16);
            let g = parseInt(c.slice(2, 4).join(''), 16);
            let b = parseInt(c.slice(4, 6).join(''), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        };

        const getCleanStatus = (raw) => (raw !== undefined && raw !== null && String(raw).trim() !== '') ? String(raw).trim() : 'ไม่ระบุสถานะ';
        const getCleanTeam = (raw) => (raw !== undefined && raw !== null && String(raw).trim() !== '') ? String(raw).trim() : 'ไม่ระบุทีม';

        function isValidTaskHelper(taskObj) {
            if (!taskObj) return false;
            let hasRealData = false;
            Object.keys(taskObj).forEach(k => {
                if (k === 'id' || k === '_rowIndex') return;
                const lk = String(k).toLowerCase().replace(/[\s_]+/g, '');
                if (lk.includes('นัดหมาย') || lk.includes('over') || lk.includes('เกินกำหนด') || lk.includes('สถานะ') || lk.includes('status') || lk.includes('วันที่') || lk.includes('เวลา') || lk.includes('date') || lk.includes('time') || lk.includes('timestamp')) {
                    return;
                }
                const val = String(taskObj[k]).trim();
                if (val !== '' && val !== '-' && val !== 'ไม่ระบุสถานะ' && val !== 'ไม่ระบุทีม') {
                    hasRealData = true;
                }
            });
            return hasRealData;
        }

        const fallbackTeamColors = [ { bg: '#f3e8ff', text: '#7e22ce', border: '#e9d5ff' }, { bg: '#ccfbf1', text: '#0f766e', border: '#99f6e4' }, { bg: '#ffedd5', text: '#c2410c', border: '#fed7aa' }, { bg: '#e0e7ff', text: '#4338ca', border: '#c7d2fe' }, { bg: '#dcfce7', text: '#15803d', border: '#bbf7d0' }, { bg: '#ffe4e6', text: '#be123c', border: '#fecdd3' } ];
        const specificTeamColors = { 'ba': { bg: '#fee2e2', text: '#991b1b', border: '#fecaca' }, 'tas': { bg: '#dbeafe', text: '#1e3a8a', border: '#bfdbfe' }, 'atg': { bg: '#fef3c7', text: '#92400e', border: '#fde68a' }, 'npy': { bg: '#d1fae5', text: '#065f46', border: '#a7f3d0' }, 'jeklink': { bg: '#fce7f3', text: '#9d174d', border: '#fbcfe8' }, 'jj&a': { bg: '#e0f2fe', text: '#075985', border: '#bae6fd' }, 'tp': { bg: '#fae8ff', text: '#86198f', border: '#f5d0fe' }, 'symc': { bg: '#ecfccb', text: '#854d0e', border: '#d9f99d' } };

        const getTeamColorStyle = (teamName, masterData) => {
            if (!teamName || String(teamName).trim() === '') return { bg: '#f1f5f9', text: '#475569', border: '#e2e8f0' };
            const str = String(teamName).trim();

            if (masterData && masterData.nsTeams) {
                const nsTeamMatch = masterData.nsTeams.find(t => t.name === str);
                if (nsTeamMatch && nsTeamMatch.bg) {
                    return { bg: hexToRgbA(nsTeamMatch.bg, 0.15), text: nsTeamMatch.text || nsTeamMatch.bg, border: nsTeamMatch.bg };
                }
            }

            if (specificTeamColors[str.toLowerCase()]) return specificTeamColors[str.toLowerCase()];
            let hash = 0; for (let i = 0; i < (str?.length || 0); i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            return fallbackTeamColors[Math.abs(hash) % fallbackTeamColors.length];
        };

        const yearColors = [
            { bg: '#e0f2fe', text: '#0369a1', border: '#bae6fd' },
            { bg: '#fce7f3', text: '#be185d', border: '#fbcfe8' },
            { bg: '#fef9c3', text: '#a16207', border: '#fef08a' },
            { bg: '#dcfce7', text: '#15803d', border: '#bbf7d0' },
            { bg: '#f3e8ff', text: '#7e22ce', border: '#e9d5ff' },
            { bg: '#ffedd5', text: '#c2410c', border: '#fed7aa' },
            { bg: '#f1f5f9', text: '#475569', border: '#e2e8f0' } 
        ];

        const getYearColorStyle = (yearStr) => {
            if (!yearStr || String(yearStr).trim() === '') return yearColors[yearColors.length - 1];
            let hash = 0; for (let i = 0; i < String(yearStr).length; i++) hash = String(yearStr).charCodeAt(i) + ((hash << 5) - hash);
            return yearColors[Math.abs(hash) % (yearColors.length - 1)];
        };

        const getDaysInMonth = (y, m) => new Date(y, m + 1, 0).getDate();
        const getFirstDayOfMonth = (y, m) => new Date(y, m, 1).getDay();
        const isSameDate = (dateStr, dateObj) => {
            const d = parseDateHelper(dateStr);
            if (!d || !dateObj) return false;
            return d.getDate() === dateObj.getDate() && d.getMonth() === dateObj.getMonth() && d.getFullYear() === dateObj.getFullYear();
        };

        // ==========================================
        // 2. Reusable UI Components
        // ==========================================
        const MultiSelect = ({ options = [], selected = [], onChange, placeholder = "ทั้งหมด" }) => {
            const [isOpen, setIsOpen] = useState(false);
            const dropdownRef = useRef(null);
            useEffect(() => {
                const handleClickOutside = (event) => { if (dropdownRef.current && !dropdownRef.current.contains(event.target)) setIsOpen(false); };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);
            const toggleOption = (opt) => { if (selected.includes(opt)) onChange(selected.filter(x => x !== opt)); else onChange([...selected, opt]); };
            return (
                <div className="relative inline-block text-left w-full md:w-auto" ref={dropdownRef}>
                    <button type="button" onClick={() => setIsOpen(!isOpen)} className="border border-slate-300 rounded-lg px-3 py-1.5 text-xs md:text-sm bg-white flex items-center justify-between w-full md:min-w-[140px] shadow-sm hover:bg-slate-50 transition-colors h-[38px]">
                        <span className="truncate pr-2 text-slate-700 font-medium">{selected?.length === 0 ? `${placeholder} (${options?.length || 0})` : `เลือกแล้ว ${selected?.length || 0} รายการ`}</span>
                        <i className={`fa-solid fa-chevron-down text-[10px] md:text-xs text-slate-400 transition-transform duration-200 ${isOpen ? 'rotate-180' : ''}`}></i>
                    </button>
                    {isOpen && (
                        <div className="origin-top-left sm:origin-top-right absolute left-0 sm:left-auto sm:right-0 mt-2 w-56 max-w-[90vw] rounded-xl shadow-xl bg-white ring-1 ring-black ring-opacity-5 z-[100] overflow-hidden">
                            <div className="max-h-[50vh] sm:max-h-60 overflow-y-auto py-2 custom-scrollbar">
                                <label className="flex items-center px-4 py-2 hover:bg-blue-50 cursor-pointer transition-colors">
                                    <input type="checkbox" checked={selected?.length === 0} onChange={() => onChange([])} className="mr-3 rounded border-slate-300 text-blue-600 focus:ring-blue-500 w-4 h-4 cursor-pointer" />
                                    <span className="text-sm font-bold text-slate-800">เลือกทั้งหมด</span>
                                </label>
                                <div className="h-px bg-slate-100 my-1"></div>
                                {options?.map(opt => (
                                    <label key={opt} className="flex items-center px-4 py-2 hover:bg-slate-50 cursor-pointer transition-colors">
                                        <input type="checkbox" checked={selected?.includes(opt)} onChange={() => toggleOption(opt)} className="mr-3 rounded border-slate-300 text-blue-600 focus:ring-blue-500 w-4 h-4 cursor-pointer" />
                                        <span className="text-sm text-slate-600 truncate" title={opt}>{opt}</span>
                                    </label>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ColumnToggle = ({ columns = [], hiddenColumns = [], setHiddenColumns }) => {
            const [isOpen, setIsOpen] = useState(false);
            const dropdownRef = useRef(null);
            useEffect(() => {
                const handleClickOutside = (event) => { if (dropdownRef.current && !dropdownRef.current.contains(event.target)) setIsOpen(false); };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);
            const toggleColumn = (col) => { if (hiddenColumns.includes(col)) setHiddenColumns(hiddenColumns.filter(c => c !== col)); else setHiddenColumns([...hiddenColumns, col]); };
            const toggleAll = () => { if (hiddenColumns?.length > 0) setHiddenColumns([]); else setHiddenColumns(columns); };
            return (
                <div className="relative inline-block text-left" ref={dropdownRef}>
                    <button type="button" onClick={() => setIsOpen(!isOpen)} className="flex items-center gap-1.5 text-xs md:text-sm font-bold text-slate-700 bg-white hover:bg-slate-50 px-3 md:px-4 py-1.5 rounded-lg border border-slate-300 shadow-sm transition-colors h-[38px]">
                        <i className="fa-regular fa-eye text-slate-500"></i> <span className="hidden sm:inline">ซ่อน/แสดง คอลัมน์</span>
                        <i className={`fa-solid fa-chevron-down text-[10px] md:text-xs text-slate-400 ml-1 transition-transform duration-200 ${isOpen ? 'rotate-180' : ''}`}></i>
                    </button>
                    {isOpen && (
                        <div className="origin-top-left sm:origin-top-right absolute left-0 sm:left-auto sm:right-0 mt-2 w-64 max-w-[90vw] rounded-xl shadow-xl bg-white ring-1 ring-black ring-opacity-5 z-[100] overflow-hidden">
                            <div className="max-h-[50vh] sm:max-h-80 overflow-y-auto py-2 custom-scrollbar">
                                <label className="flex items-center px-4 py-2 hover:bg-blue-50 cursor-pointer transition-colors border-b border-slate-100">
                                    <input type="checkbox" checked={hiddenColumns?.length === 0} onChange={toggleAll} className="mr-3 rounded border-slate-300 text-blue-600 focus:ring-blue-500 w-4 h-4 cursor-pointer" />
                                    <span className="text-sm font-bold text-slate-800">แสดงทั้งหมด</span>
                                </label>
                                {columns?.map(col => (
                                    <label key={col} className="flex items-center px-4 py-2 hover:bg-slate-50 cursor-pointer transition-colors">
                                        <input type="checkbox" checked={!hiddenColumns?.includes(col)} onChange={() => toggleColumn(col)} className="mr-3 rounded border-slate-300 text-blue-600 focus:ring-blue-500 w-4 h-4 cursor-pointer" />
                                        <span className="text-sm text-slate-600 truncate" title={col}>{col}</span>
                                    </label>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ChartComponent = ({ type, data, options }) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            useEffect(() => {
                if (chartInstance.current) chartInstance.current.destroy();
                const ctx = chartRef.current.getContext('2d');
                chartInstance.current = new Chart(ctx, { type, data, options });
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [type, data, options]);
            return <canvas ref={chartRef} style={{ width: '100%', height: '100%' }} />;
        };

        const DraggableFAB = ({ onClick }) => {
            const [position, setPosition] = useState(() => ({ x: typeof window !== 'undefined' ? window.innerWidth - 80 : 0, y: typeof window !== 'undefined' ? window.innerHeight - 80 : 0 }));
            const draggingRef = useRef(false);
            const startPosRef = useRef({ x: 0, y: 0 });
            const fabRef = useRef(null);
            const dragDistance = useRef(0);
            const lastPos = useRef({ x: 0, y: 0 });
            useEffect(() => {
                const handleResize = () => {
                    setPosition(prev => {
                        let nx = prev.x, ny = prev.y;
                        if (nx > window.innerWidth - 70) nx = window.innerWidth - 80;
                        if (ny > window.innerHeight - 70) ny = window.innerHeight - 80;
                        return { x: nx, y: ny };
                    });
                };
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);
            const onDown = (e) => {
                draggingRef.current = true; dragDistance.current = 0; lastPos.current = { x: e.clientX, y: e.clientY };
                const rect = fabRef.current.getBoundingClientRect();
                startPosRef.current = { offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top };
                e.currentTarget.setPointerCapture(e.pointerId);
            };
            const onMove = (e) => {
                if (!draggingRef.current) return;
                const dx = e.clientX - lastPos.current.x, dy = e.clientY - lastPos.current.y;
                dragDistance.current += Math.sqrt(dx * dx + dy * dy);
                lastPos.current = { x: e.clientX, y: e.clientY };
                let newX = e.clientX - startPosRef.current.offsetX, newY = e.clientY - startPosRef.current.offsetY;
                const maxX = document.documentElement.clientWidth - 60, maxY = document.documentElement.clientHeight - 60;
                newX = Math.max(10, Math.min(newX, maxX)); newY = Math.max(10, Math.min(newY, maxY));
                setPosition({ x: newX, y: newY });
            };
            const onUp = (e) => {
                draggingRef.current = false; e.currentTarget.releasePointerCapture(e.pointerId);
                if (dragDistance.current < 10) onClick();
            };
            return (
                <button ref={fabRef} onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} className="lg:hidden fixed z-[100] bg-blue-600 text-white w-14 h-14 rounded-full shadow-[0_4px_20px_rgba(37,99,235,0.5)] flex items-center justify-center transition-shadow touch-none" style={{ left: position.x, top: position.y }} title="เปิดเมนู (ลากเพื่อย้าย)">
                    <i className="fa-solid fa-bars text-2xl pointer-events-none"></i>
                </button>
            );
        };

        // -------------------------------------------------------------
        // --- COMPONENT: MASTER DATA MANAGEMENT ---
        // -------------------------------------------------------------

            const handleSaveZone = (index, field, val) => {

            const addZone = () => {

                masterDataRef.set(dataToSave, { merge: true });

            return (
                <div className="absolute inset-0 p-4 md:p-8 overflow-y-auto custom-scrollbar bg-slate-50">
                    <div className="max-w-6xl mx-auto">
                        <header className="mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                            <div>

                                        <i className="fa-solid fa-pen-to-square mr-2"></i> แก้ไขข้อมูล
                                    </button>
                                ) : (
                                    <>
                                        <button onClick={() => { setIsEditing(false); setTempData({ ...masterData, nsTeams: masterData.nsTeams || [], nsStatuses: masterData.nsStatuses || [] }); }} className="bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2 rounded-lg font-semibold transition-colors text-sm">
                                            ยกเลิก

                                        <button onClick={handleSave} className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-lg font-bold shadow-sm transition-colors text-sm flex items-center">
                                            <i className="fa-solid fa-check mr-2"></i> ยืนยันการบันทึก
                                        </button>

                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="lg:col-span-1 space-y-6">
                                <div className={`p-5 rounded-xl border shadow-sm transition-colors ${isEditing ? 'bg-white border-blue-200 ring-1 ring-blue-100' : 'bg-slate-100/50 border-slate-200'}`}>
                                    <h3 className="font-bold text-slate-800 mb-3 flex items-center"><i className="fa-solid fa-users-gear text-indigo-500 mr-2"></i> ฐานข้อมูลทีมงาน (Subcon)</h3>
                                    <div>
                                        <label className="text-xs font-bold text-slate-500">รายชื่อทีม Subcontract (คั่นด้วยลูกน้ำ ,)</label>
                                        <textarea disabled={!isEditing} value={Array.isArray(tempData.teams) ? tempData.teams.join(', ') : tempData.teams} onChange={e => setTempData({...tempData, teams: e.target.value})} rows="4" className="w-full mt-1 px-3 py-2 border border-slate-300 rounded-md outline-none focus:ring-2 focus:ring-indigo-500 text-sm disabled:bg-slate-100 disabled:text-slate-500"></textarea>

                                <div className={`p-5 rounded-xl border shadow-sm transition-colors ${isEditing ? 'bg-white border-amber-200 ring-1 ring-amber-100' : 'bg-slate-100/50 border-slate-200'}`}>
                                    <h3 className="font-bold text-slate-800 mb-3 flex items-center"><i className="fa-solid fa-user-tie text-amber-500 mr-2"></i> ฐานข้อมูล NS Responsible</h3>
                                    <div className="space-y-2">

                                                    </div>
                                                    {isEditing && <button onClick={() => { let newT = tempData.nsTeams.filter((_, i) => i !== idx); setTempData({...tempData, nsTeams: newT}); }} className="text-slate-300 hover:text-red-500 transition-colors ml-1"><i className="fa-solid fa-circle-xmark"></i></button>}

                                <div className={`p-5 rounded-xl border shadow-sm transition-colors ${isEditing ? 'bg-white border-emerald-200 ring-1 ring-emerald-100' : 'bg-slate-100/50 border-slate-200'}`}>
                                    <h3 className="font-bold text-slate-800 mb-3 flex items-center"><i className="fa-solid fa-tags text-emerald-500 mr-2"></i> ฐานข้อมูล Status JOB</h3>
                                    <div className="space-y-2">
                                        <label className="text-xs font-bold text-slate-500">รายชื่อ Status JOB และสี (ปรับแต่งได้)</label>
                                        <div className="max-h-48 overflow-y-auto custom-scrollbar pr-2 space-y-2">
                                            {Array.isArray(tempData.nsStatuses) && tempData.nsStatuses.map((st, idx) => (
                                                <div key={idx} className="flex gap-2 items-center bg-white p-2 rounded-lg border border-slate-200">
                                                    <input type="text" disabled={!isEditing} value={st.name} onChange={e => { let newS = [...tempData.nsStatuses]; newS[idx] = { ...newS[idx], name: e.target.value }; setTempData({...tempData, nsStatuses: newS}); }} className="flex-1 w-full px-2 py-1 border border-slate-200 rounded text-xs bg-white disabled:bg-slate-100 disabled:text-slate-500" placeholder="ชื่อสถานะ" />
                                                    <div className="flex flex-col items-center shrink-0">
                                                        <span className="text-[8px] text-slate-400 font-bold mb-0.5">พื้นหลัง</span>
                                                        <input type="color" disabled={!isEditing} value={st.bg || '#fef3c7'} onChange={e => { let newS = [...tempData.nsStatuses]; newS[idx] = { ...newS[idx], bg: e.target.value }; setTempData({...tempData, nsStatuses: newS}); }} className="w-6 h-6 p-0 border-0 cursor-pointer disabled:opacity-50 rounded" title="สีพื้นหลัง" />
                                                    </div>
                                                    <div className="flex flex-col items-center shrink-0">
                                                        <span className="text-[8px] text-slate-400 font-bold mb-0.5">ตัวอักษร</span>
                                                        <input type="color" disabled={!isEditing} value={st.text || '#b45309'} onChange={e => { let newS = [...tempData.nsStatuses]; newS[idx] = { ...newS[idx], text: e.target.value }; setTempData({...tempData, nsStatuses: newS}); }} className="w-6 h-6 p-0 border-0 cursor-pointer disabled:opacity-50 rounded" title="สีตัวอักษร" />
                                                    </div>
                                                    {isEditing && <button onClick={() => { let newS = tempData.nsStatuses.filter((_, i) => i !== idx); setTempData({...tempData, nsStatuses: newS}); }} className="text-slate-300 hover:text-red-500 transition-colors ml-1"><i className="fa-solid fa-circle-xmark"></i></button>}
                                                </div>
                                            ))}
                                        </div>
                                        {isEditing && <button onClick={() => setTempData({...tempData, nsStatuses: [...(tempData.nsStatuses||[]), {name: '', bg: '#fef3c7', text: '#b45309'}]})} className="text-[10px] font-bold bg-emerald-100 text-emerald-700 hover:bg-emerald-200 px-3 py-1.5 rounded-lg transition-colors w-full flex items-center justify-center"><i className="fa-solid fa-plus mr-1"></i> เพิ่มสถานะ NS</button>}
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-2">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-bold text-slate-800"><i className="fa-solid fa-map-location-dot text-amber-500 mr-2"></i> ฐานข้อมูลโซนพื้นที่ (Zones)</h3>
                                    {isEditing && (
                                        <button onClick={addZone} className="text-xs bg-amber-100 text-amber-700 hover:bg-amber-200 px-3 py-1.5 rounded-lg font-bold transition-colors">
                                            <i className="fa-solid fa-plus"></i> เพิ่มโซน
                                        </button>
                                    )}
                                </div>
                                
                                <div className="grid grid-cols-1 xl:grid-cols-2 gap-4">
                                    {(tempData.zones || []).map((zone, idx) => (
                                        <div key={zone.id} className={`p-4 rounded-xl shadow-sm relative transition-colors ${isEditing ? 'bg-white border border-amber-200 hover:shadow-md' : 'bg-slate-100/50 border border-slate-200'}`}>
                                            {isEditing && (
                                                <button onClick={() => delZone(idx)} className="absolute top-3 right-3 text-slate-300 hover:text-red-500 transition-colors"><i className="fa-solid fa-trash"></i></button>

                                            <div className="space-y-3">

                                                    <input 
                                                        type="text" 
                                                        disabled={!isEditing}

                                                        onChange={e => handleSaveZone(idx, 'name', e.target.value)}

                                                    />

                                                    <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">เขต/อำเภอ (คั่นด้วยลูกน้ำ ,)</label>
                                                    <textarea 
                                                        disabled={!isEditing}
                                                        value={zone.districts} 
                                                        onChange={e => handleSaveZone(idx, 'districts', e.target.value)} 
                                                        rows="2" 
                                                        className="w-full mt-0.5 px-2 py-1 border border-slate-200 rounded bg-slate-50 outline-none focus:ring-1 focus:ring-amber-500 text-xs disabled:bg-transparent disabled:border-transparent disabled:px-0" 
                                                        ></textarea>

                                                        disabled={!isEditing}
                                                        value={zone.teams}

                                                        rows="1" 
                                                        className="w-full mt-0.5 px-2 py-1 border border-slate-200 rounded bg-slate-50 outline-none focus:ring-1 focus:ring-amber-500 text-xs disabled:bg-transparent disabled:border-transparent disabled:px-0 font-semibold text-indigo-700"

        };

        // -------------------------------------------------------------
        // --- COMPONENT: ASSIGN JOB & LINE NOTIFY ---
        // -------------------------------------------------------------
        const AssignJobTab = ({ masterData, queueState, setQueueState, masterDataRef, collectionRef, GAS_WEB_APP_URL, nsTasks, autoAssignData, clearAutoAssignData, customAlert }) => {
            const getInitialFormState = () => {
                const now = new Date();
                return {
                    date: `${String(now.getDate()).padStart(2, '0')}/${String(now.getMonth() + 1).padStart(2, '0')}/${now.getFullYear()} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`,
                    cid: '', siteType: 'Terminate', districtSearch: '', zoneId: '', team: '', customerName: '', address: '', phone: '', cancelDate: '', getbackDate: '', getbackTime: '', details: '', nextTeam: ''
                };
            };

            const [form, setForm] = useState(getInitialFormState());
            const [equipments, setEquipments] = useState([{ name: '', serial: '' }]);
            const [isSending, setIsSending] = useState(false);
            const [searchCid, setSearchCid] = useState('');

            const allDistrictsMap = useMemo(() => {
                let map = [];
                (masterData.zones || []).forEach(z => {
                    const dists = (z.districts || '').split(',').map(d => d.trim()).filter(Boolean);
                    dists.forEach(d => map.push({ name: d, zoneId: z.id, zoneName: z.name }));
                });
                return map.sort((a,b) => a.name.localeCompare(b.name, 'th'));
            }, [masterData.zones]);

            const getVal = (t, keys) => {
                const matchedKey = Object.keys(t || {}).find(k => keys.some(kw => String(k).toLowerCase().replace(/[\s_]+/g,'').includes(kw.toLowerCase().replace(/[\s_]+/g,''))));
                return matchedKey ? t[matchedKey] : '';
            };

            const nsCidOptions = useMemo(() => {
                const cids = (nsTasks || []).map(t => getVal(t, ['circuitno'])).filter(c => c && String(c).trim() !== '');
                return [...new Set(cids)];
            }, [nsTasks]);

            useEffect(() => {
                if (autoAssignData && autoAssignData.cid) {
                    setSearchCid(autoAssignData.cid);
                    executeAutoFill(autoAssignData.cid, autoAssignData.siteType || 'Terminate');
                    clearAutoAssignData();
                }
            }, [autoAssignData]);

            const executeAutoFill = (searchCidValue, currentSiteType) => {
                if (!searchCidValue.trim()) return;
                
                const matchedCids = (nsTasks || []).filter(t => {
                    const cid = getVal(t, ['circuitno']);
                    return String(cid).trim().toLowerCase() === searchCidValue.trim().toLowerCase();
                });

                if (matchedCids.length === 0) {
                    customAlert(`❌ ไม่พบข้อมูล CID: "${searchCidValue}" ในฐานข้อมูล NS`, 'error');
                    return;
                }

                let actualSiteType = currentSiteType || 'Terminate';
                const siteTypeKeys = ['sitetype', 'site']; 
                
                let matchedRows = matchedCids.filter(t => {
                    const st = getVal(t, siteTypeKeys);
                    return st && String(st).trim().toLowerCase() === actualSiteType.toLowerCase();
                });

                let isAutoSwitched = false;

                if (matchedRows.length === 0) {
                    const firstSt = String(getVal(matchedCids[0], siteTypeKeys)).trim();
                    if (firstSt) {
                        actualSiteType = firstSt;
                        matchedRows = matchedCids.filter(t => {
                            const st = getVal(t, siteTypeKeys);
                            return st && String(st).trim().toLowerCase() === actualSiteType.toLowerCase();
                        });
                        isAutoSwitched = true;
                    } else {
                        matchedRows = matchedCids;
                    }
                }

                if (matchedRows.length > 0) {
                    const first = matchedRows[0];
                    
                    const rawAmphur = getVal(first, ['amphur', 'อำเภอ', 'เขต', 'district']) || '';
                    let matchedZoneId = '';
                    let matchedTeam = '';
                    let matchedNextTeam = '';
                    let displayDistrict = '';

                    if (rawAmphur) {
                        const cleanAmphur = String(rawAmphur).replace(/เขต|อำเภอ|อ\./g, '').trim().toLowerCase();
                        const foundDistrict = allDistrictsMap.find(d => {
                            const cleanD = d.name.replace(/เขต|อำเภอ|อ\./g, '').trim().toLowerCase();
                            return cleanAmphur === cleanD || cleanAmphur.includes(cleanD) || cleanD.includes(cleanAmphur);
                        });

                        if (foundDistrict) {
                            displayDistrict = foundDistrict.name;
                            matchedZoneId = foundDistrict.zoneId;
                            const zone = (masterData.zones || []).find(z => z.id === matchedZoneId);
                            if (zone) {
                                const tArr = (zone.teams || '').split(',').map(t => t.trim()).filter(Boolean);
                                let currentQ = queueState[zone.id] || 0;
                                matchedTeam = tArr.length > 0 ? tArr[currentQ % tArr.length] : '';
                                matchedNextTeam = tArr.length > 0 ? tArr[(currentQ + 1) % tArr.length] : '';
                            }
                        } else {
                            displayDistrict = rawAmphur;
                        }
                    }

                    setForm(prev => ({
                        ...prev,
                        cid: getVal(first, ['circuitno']) || prev.cid, 
                        siteType: actualSiteType,
                        customerName: getVal(first, ['customername', 'company', 'บริษัท']) || '',
                        address: getVal(first, ['address', 'ที่อยู่']) || '',
                        phone: getVal(first, ['customercontract', 'contract', 'เบอร์']) || '',
                        cancelDate: getVal(first, ['duejob', 'due', 'ยกเลิก']) || '',
                        getbackDate: getVal(first, ['getbackdate', 'วันที่เข้าเก็บ', 'date']) || '',
                        getbackTime: getVal(first, ['getbacktime', 'เวลาเข้าเก็บ', 'time']) || '',
                        districtSearch: displayDistrict || prev.districtSearch,
                        zoneId: matchedZoneId || prev.zoneId,
                        team: matchedTeam || prev.team,
                        nextTeam: matchedNextTeam || prev.nextTeam,
                        details: '' 
                    }));

                    const equips = matchedRows.map(t => ({
                        name: getVal(t, ['itemname', 'อุปกรณ์', 'item']) || '',
                        serial: getVal(t, ['serialno', 'serial', 'sn']) || ''
                    })).filter(e => e.name || e.serial);

                    equips.sort((a, b) => {
                        const aHasSn = (a.serial || '').trim() !== '' ? 1 : 0;
                        const bHasSn = (b.serial || '').trim() !== '' ? 1 : 0;
                        return bHasSn - aHasSn;
                    });

                    if (equips.length > 0) {
                        setEquipments(equips);
                    } else {
                        setEquipments([{ name: '', serial: '' }]);
                    }
                    
                    if (isAutoSwitched && !autoAssignData) {
                        customAlert(`✅ ดึงข้อมูล CID: ${searchCidValue} สำเร็จ! (สลับ Site Type เป็น "${actualSiteType}" ให้อัตโนมัติ)`, 'success');
                    } else if (!autoAssignData) {
                        customAlert(`✅ ดึงข้อมูล CID: ${searchCidValue} สำเร็จ! พบอุปกรณ์ ${equips.length} รายการ`, 'success');
                    }
                }
            };

            const handleAutoFillClick = () => {
                executeAutoFill(searchCid, form.siteType);
            };

            const handleDistrictInput = (e) => {
                const val = e.target.value;
                setForm(prev => ({...prev, districtSearch: val}));
                const found = allDistrictsMap.find(d => d.name === val);
                if (found) handleZoneSelect(found.zoneId);
            };

            const handleZoneSelect = (zoneId) => {
                const zone = (masterData.zones || []).find(z => z.id === zoneId);
                if (zone) {
                    const tArr = (zone.teams || '').split(',').map(t => t.trim()).filter(Boolean);
                    let currentQ = queueState[zone.id] || 0;
                    let t1 = tArr.length > 0 ? tArr[currentQ % tArr.length] : '';
                    let t2 = tArr.length > 0 ? tArr[(currentQ + 1) % tArr.length] : '';
                    setForm(prev => ({ ...prev, zoneId: zoneId, team: t1, nextTeam: t2 }));
                } else {
                    setForm(prev => ({ ...prev, zoneId: '', team: '', nextTeam: '' }));
                }
            };

            const addEquip = () => setEquipments([...equipments, { name: '', serial: '' }]);
            const rmEquip = (idx) => setEquipments(equipments.filter((_, i) => i !== idx));

            const generateMessage = () => {
                return `📌📋 [แจ้งสถานะการจ่ายงาน: Remove-Equipment]
---------------------------
 📅 วันที่/เวลาแจ้ง: ${form.date}
 CIDs: ${form.cid || '-'}

 ผู้รับเหมา: ${form.team || '-'}
 บริษัทลูกค้า: ${form.customerName || '-'}
 ที่อยู่: ${form.address || '-'}
 เบอร์ติดต่อ: ${form.phone || '-'}
 วันที่ยกเลิกใช้งาน: ${form.cancelDate || '-'}
 วันที่เข้าเก็บ: ${form.getbackDate || '-'}  เวลา  : ${form.getbackTime || '-'}

 รายละเอียดงาน: ${form.details || '-'}

รายการอุปกรณ์:
${equipments.map((e, i) => `${i + 1}. ${e.name || 'อุปกรณ์'} [ SN: ${e.serial || '-'} ]`).join('\n')}

 ⏭️ ผู้รับเหมาลำดับถัดไป: ${form.nextTeam || '-'}`;
            };

            const submitJob = async () => {
                if (!form.zoneId && !form.team) { customAlert('กรุณาเลือกโซนพื้นที่รับผิดชอบ หรือระบุทีมงาน', 'error'); return; }
                setIsSending(true);
                
                try {
                    const newTaskId = `task_assign_${Date.now()}`;
                    
                    const dynamicFormula = `=LET(day_diff, (INT(INDIRECT("O"&ROW())) + 3) - IF(ISBLANK(INDIRECT("A"&ROW())), TODAY(), INT(INDIRECT("A"&ROW()))), IF(day_diff < 0, "เกินกำหนด " & ABS(day_diff) & " วัน", IF(day_diff = 0, "ครบกำหนด", "เหลือเวลา " & day_diff & " วัน")))`;
                    
                    const newTaskData = {
                        "วันที่แจ้ง Subcontract": form.date,
                        "CID Customer": form.cid,
                        "ทีมงาน": form.team,
                        "บริษัทลูกค้า": form.customerName,
                        "ชื่อและเบอร์โทรลูกค้าประสานงาน": form.phone,
                        "วันที่ยกเลิกใช้งาน": form.cancelDate,
                        "สถานะ": "รอเข้าเก็บ",
                        "วันที่เข้าเก็บ": form.getbackDate || '',
                        "เวลาเข้าเก็บ": form.getbackTime || '',
                        "นัดหมายลูกค้า": dynamicFormula,
                        "_rowIndex": 999999 
                    };
                    const equipStr = equipments.map((e, i) => `${i + 1}. ${e.name || 'อุปกรณ์'} [ SN: ${e.serial || '-'} ]`).join('\n');
                    newTaskData["รายละเอียดงาน"] = `[Site Type: ${form.siteType}] \n[เข้าเก็บ: ${form.getbackDate || '-'} เวลา ${form.getbackTime || '-'}] \n\n${form.details}\n\nรายการอุปกรณ์:\n${equipStr}`;

                    await collectionRef.doc(newTaskId).set(newTaskData);

                    if (form.zoneId) {
                        const zone = (masterData.zones || []).find(z => z.id === form.zoneId);
                        if (zone) {
                            const tArr = (zone.teams || '').split(',').map(t => t.trim()).filter(Boolean);
                            let currentQ = queueState[form.zoneId] || 0;
                            let newQ = tArr.length > 0 ? (currentQ + 1) % tArr.length : 0;
                            
                            const manualNextIndex = tArr.findIndex(t => t === form.nextTeam);
                            if (manualNextIndex !== -1) newQ = manualNextIndex;
                            
                            masterDataRef.set({ queue: { ...queueState, [form.zoneId]: newQ } }, { merge: true });
                            setQueueState({ ...queueState, [form.zoneId]: newQ });
                        }
                    }

                    const msg = generateMessage();
                    customAlert('✅ สั่งงานเรียบร้อย (ระบบกำลังจัดการส่ง LINE และลง Sheet ให้อัตโนมัติ)', 'success');
                    
                    setForm(getInitialFormState());
                    setEquipments([{ name: '', serial: '' }]);
                    setSearchCid('');

                    if (GAS_WEB_APP_URL) {
                        const payloadData = JSON.stringify({ 
                            action: 'sendLineNotify', 
                            message: msg,
                            taskData: newTaskData,
                            tempTaskId: newTaskId 
                        });
                        fetch(GAS_WEB_APP_URL, {
                            method: 'POST', mode: 'no-cors',
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: payloadData
                        }).catch(e => console.error("Background sync to Sheet failed:", e));
                    }
                } catch (e) {
                    console.error("Failed to send/save:", e);
                    customAlert('เกิดข้อผิดพลาดในการเชื่อมต่อกับเซิร์ฟเวอร์', 'error');
                }
                setIsSending(false);
            };

            const handleCopy = () => {
                const text = generateMessage();
                try {
                    const textArea = document.createElement("textarea");
                    textArea.value = text; textArea.style.position = "fixed"; textArea.style.left = "-999999px";
                    document.body.appendChild(textArea); textArea.focus(); textArea.select();
                    document.execCommand('copy'); textArea.remove(); customAlert('คัดลอกข้อความแล้ว!', 'success');
                } catch (err) { customAlert('ไม่สามารถคัดลอกได้ กรุณาคัดลอกด้วยตัวเอง', 'error'); }
            };

            return (
                <div className="absolute inset-0 p-3 md:p-6 overflow-y-auto custom-scrollbar bg-slate-100 flex flex-col lg:flex-row gap-4">
                    <div className="flex-1 bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col gap-3">
                        <div className="flex justify-between items-center border-b pb-2">
                            <h2 className="text-lg font-bold text-slate-800"><i className="fa-solid fa-clipboard-user text-blue-600 mr-2"></i> ฟอร์มมอบหมายงาน</h2>
                        </div>

                        <div className="bg-indigo-50 border border-indigo-200 p-3 rounded-lg shadow-sm">
                            <h3 className="text-xs font-bold text-indigo-800 mb-1.5"><i className="fa-solid fa-wand-magic-sparkles mr-1"></i> ดึงข้อมูลอัตโนมัติจาก NS (ค้นหาด้วย CID)</h3>
                            <div className="flex flex-col sm:flex-row gap-2">
                                <div className="flex-1 flex gap-2">
                                    <input type="text" placeholder="พิมพ์ CIRCUIT NO..." value={searchCid} onChange={e => setSearchCid(e.target.value)} className="flex-1 px-3 py-1.5 rounded-md border border-indigo-300 outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-semibold shadow-inner" list="ns-cids-list" />
                                    <datalist id="ns-cids-list">{(nsCidOptions || []).map((c, i) => <option key={i} value={c} />)}</datalist>
                                    <select value={form.siteType} onChange={e=>setForm({...form, siteType: e.target.value})} className="px-2 py-1.5 border border-indigo-300 rounded-md text-sm outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-indigo-800 bg-white shadow-inner w-28 shrink-0">
                                        <option value="Terminate">Terminate</option>
                                        <option value="Originate">Originate</option>
                                    </select>
                                </div>
                                <button onClick={handleAutoFillClick} type="button" className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded-md text-sm font-bold shadow-sm transition-colors whitespace-nowrap"><i className="fa-solid fa-cloud-arrow-down mr-1"></i> ดึงข้อมูล NS</button>
                            </div>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                            <div>
                                <label className="text-[10px] font-bold text-slate-500 uppercase">วันที่/เวลาแจ้ง</label>
                                <input type="text" value={form.date} onChange={e=>setForm({...form, date: e.target.value})} className="w-full mt-0.5 px-2 py-1 border rounded text-xs bg-slate-50 text-slate-600" />
                            </div>
                            <div className="md:col-span-2">
                                <label className="text-[10px] font-bold text-slate-500 uppercase">พิมพ์ค้นหาเขต/อำเภอเพื่อเลือกทีม</label>
                                <div className="flex gap-2">
                                    <input type="text" list="districts-list" placeholder="เช่น เขตพระนคร" value={form.districtSearch} onChange={handleDistrictInput} className="w-full mt-0.5 px-2 py-1 border rounded text-xs outline-none focus:border-amber-500" />
                                    <datalist id="districts-list">{(allDistrictsMap || []).map((d, i) => <option key={i} value={d.name} />)}</datalist>
                                    <select value={form.zoneId} onChange={(e)=>handleZoneSelect(e.target.value)} className="w-full mt-0.5 px-2 py-1 border border-amber-300 rounded text-xs font-bold text-amber-800 bg-amber-50 outline-none">
                                        <option value="">-- เลือกโซนพื้นที่ --</option>
                                        <option value="">-- เลือกโซนพื้นที่ --</option>
                                        {(masterData.zones || []).map(z => <option key={z.id} value={z.id}>{z.name}</option>)}
                                    </select>
                                </div>
                            </div>
                            <div></div>
                            <div>
                                <label className="text-[10px] font-bold text-slate-500 uppercase text-blue-600">ผู้รับเหมา (คิวปัจจุบัน)</label>
                                <select value={form.team} onChange={e=>setForm({...form, team: e.target.value})} className="w-full mt-0.5 px-2 py-1 border border-blue-300 rounded text-xs font-bold text-blue-700 bg-blue-50 outline-none focus:ring-1 focus:ring-blue-500">
                                    <option value="">- เลือกระบุทีมเอง -</option>
                                    <optgroup label="ทีมในโซนพื้นที่">{form.zoneId && (masterData.zones || []).find(z=>z.id===form.zoneId)?.teams.split(',').map(t=><option key={`z-${t}`} value={t.trim()}>{t.trim()}</option>)}</optgroup>
                                    <optgroup label="รายชื่อทีมทั้งหมด">{(masterData.teams || []).map(t => <option key={`a-${t}`} value={t}>{t}</option>)}</optgroup>
                                </select>
                            </div>
                            <div>
                                <label className="text-[10px] font-bold text-slate-500 uppercase text-slate-400">คิวลำดับถัดไป</label>
                                <select value={form.nextTeam} onChange={e=>setForm({...form, nextTeam: e.target.value})} className="w-full mt-0.5 px-2 py-1 border border-slate-300 rounded text-xs font-bold text-slate-600 bg-white outline-none focus:ring-1 focus:ring-slate-500">
                                    <option value="">- เลือกระบุทีมเอง -</option>
                                    <optgroup label="ทีมในโซนพื้นที่">{form.zoneId && (masterData.zones || []).find(z=>z.id===form.zoneId)?.teams.split(',').map(t=><option key={`nz-${t}`} value={t.trim()}>{t.trim()}</option>)}</optgroup>
                                    <optgroup label="รายชื่อทีมทั้งหมด">{(masterData.teams || []).map(t => <option key={`na-${t}`} value={t}>{t}</option>)}</optgroup>
                                </select>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-12 gap-3 border-t pt-3">
                            <div className="col-span-1 md:col-span-4 flex gap-2">
                                <div className="flex-1">
                                    <label className="text-[10px] font-bold text-slate-500 uppercase">CIDs</label>
                                    <input type="text" value={form.cid} onChange={e=>setForm({...form, cid: e.target.value})} className="w-full mt-0.5 px-2 py-1 border rounded text-xs font-bold text-blue-700" />
                                </div>
                                <div className="w-20 shrink-0 hidden md:block">
                                    <label className="text-[10px] font-bold text-slate-500 uppercase">Site</label>
                                    <input type="text" value={form.siteType} disabled className="w-full mt-0.5 px-2 py-1 border border-dashed rounded text-[10px] font-semibold text-slate-500 bg-slate-50" />
                                </div>
                            </div>
                            <div className="col-span-1 md:col-span-8">
                                <label className="text-[10px] font-bold text-slate-500 uppercase">บริษัทลูกค้า (Customer Name)</label>
                                <input type="text" value={form.customerName} onChange={e=>setForm({...form, customerName: e.target.value})} className="w-full mt-0.5 px-2 py-1 border rounded text-xs" />
                            </div>

                            <div className="col-span-1 md:col-span-8">
                                <label className="text-[10px] font-bold text-slate-500 uppercase">ที่อยู่ (Address)</label>
                                <input type="text" value={form.address} onChange={e=>setForm({...form, address: e.target.value})} className="w-full mt-0.5 px-2 py-1 border rounded text-xs" />
                            </div>
                            <div className="col-span-1 md:col-span-4">
                                <label className="text-[10px] font-bold text-slate-500 uppercase">เบอร์ติดต่อ</label>
                                <input type="text" value={form.phone} onChange={e=>setForm({...form, phone: e.target.value})} className="w-full mt-0.5 px-2 py-1 border rounded text-xs" />
                            </div>
                            
                            <div className="col-span-1 md:col-span-4">
                                <label className="text-[10px] font-bold text-slate-500 uppercase">วันที่ยกเลิก (Due Job)</label>
                                <input type="text" value={form.cancelDate} onChange={e=>setForm({...form, cancelDate: e.target.value})} className="w-full mt-0.5 px-2 py-1 border rounded text-xs text-red-600" />
                            </div>
                            <div className="col-span-1 md:col-span-8 flex gap-2 bg-slate-50 p-2 rounded-lg border border-slate-200">
                                <div className="flex-1">
                                    <label className="text-[10px] font-bold text-slate-500 uppercase">เข้าเก็บ (Getback Date)</label>
                                    <input type="text" placeholder="ระบุวัน" value={form.getbackDate} onChange={e=>setForm({...form, getbackDate: e.target.value})} className="w-full mt-0.5 px-2 py-1 border rounded text-xs" />
                                </div>
                                <div className="flex-1">
                                    <label className="text-[10px] font-bold text-slate-500 uppercase">เวลา (Time)</label>
                                    <input type="text" placeholder="ระบุเวลา" value={form.getbackTime} onChange={e=>setForm({...form, getbackTime: e.target.value})} className="w-full mt-0.5 px-2 py-1 border rounded text-xs" />
                                </div>
                            </div>

                            <div className="col-span-1 md:col-span-12">
                                <label className="text-[10px] font-bold text-slate-500 uppercase">รายละเอียดงาน (เพิ่มเติม)</label>
                                <textarea rows="1" value={form.details} onChange={e=>setForm({...form, details: e.target.value})} className="w-full mt-0.5 px-2 py-1 border rounded text-xs"></textarea>
                            </div>
                        </div>

                        <div className="mt-1 border rounded-lg p-2 bg-slate-50/50">
                            <div className="flex justify-between items-center mb-2">
                                <label className="text-xs font-bold text-slate-600 uppercase">รายการอุปกรณ์ ({equipments.length} รายการ)</label>
                                <button onClick={addEquip} className="text-[10px] bg-slate-800 hover:bg-slate-700 text-white px-2 py-1 rounded shadow-sm transition-colors"><i className="fa-solid fa-plus"></i> เพิ่มอุปกรณ์</button>
                            </div>
                            <div className="space-y-1.5 max-h-[30vh] overflow-y-auto custom-scrollbar pr-2 pb-1">
                                {equipments.map((eq, i) => (
                                    <div key={i} className="flex gap-2 items-center bg-white p-1.5 rounded border border-slate-200 shadow-sm hover:border-blue-300 transition-colors">
                                        <div className="w-6 text-center text-xs font-bold text-slate-300">{i+1}.</div>
                                        <input type="text" placeholder="ชื่ออุปกรณ์" value={eq.name} onChange={e=>{let ne=[...equipments]; ne[i].name=e.target.value; setEquipments(ne);}} className="flex-1 px-2 py-1 border-b border-transparent hover:border-slate-200 focus:border-blue-400 text-xs outline-none font-semibold" />
                                        <div className="w-px h-4 bg-slate-200"></div>
                                        <input type="text" placeholder="Serial Number" value={eq.serial} onChange={e=>{let ne=[...equipments]; ne[i].serial=e.target.value; setEquipments(ne);}} className="flex-1 px-2 py-1 border-b border-transparent hover:border-slate-200 focus:border-blue-400 text-xs outline-none text-indigo-700" />
                                        {equipments.length > 1 && <button onClick={()=>rmEquip(i)} className="text-slate-300 hover:text-red-500 px-1 transition-colors"><i className="fa-solid fa-circle-xmark"></i></button>}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="w-full lg:w-[350px] flex flex-col shrink-0">
                        <div className="flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col overflow-hidden">
                            <div className="bg-slate-800 text-white p-2.5 font-bold text-center flex justify-between items-center text-sm">
                                <span><i className="fa-brands fa-line text-green-400 mr-1 text-base"></i> Line Preview</span>
                            </div>
                            <div className="flex-1 line-preview p-3 overflow-y-auto custom-scrollbar flex flex-col">
                                <div className="line-bubble p-3 text-xs text-slate-800 whitespace-pre-wrap font-sans leading-relaxed">
                                    {generateMessage()}
                                </div>
                            </div>
                            <div className="p-3 bg-white border-t border-slate-200">
                                <button onClick={submitJob} disabled={isSending} className={`w-full ${isSending ? 'bg-slate-400' : 'bg-[#06C755] hover:bg-[#05b34c]'} text-white font-bold py-2.5 rounded-lg shadow-sm transition-transform active:scale-95 flex items-center justify-center gap-2 text-sm`}>
                                    <i className="fa-solid fa-paper-plane"></i> จ่ายงาน & ส่ง Line
                                </button>
                                <button onClick={handleCopy} className="w-full mt-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-1.5 rounded-lg text-xs transition-colors">
                                    <i className="fa-regular fa-copy"></i> คัดลอก
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 3. MAIN APP COMPONENT
        // ==========================================
        function App() {
          const [activeTab, setActiveTab] = useState('dashboard');
          const [tasks, setTasks] = useState([]);
          const [nsTasks, setNsTasks] = useState([]); 
          const [isLoading, setIsLoading] = useState(true);
          const [firebaseError, setFirebaseError] = useState(null); 
          const [isSidebarOpen, setIsSidebarOpen] = useState(window.innerWidth > 1024);
          
          const [columns, setColumns] = useState([]);
          const [nsColumns, setNsColumns] = useState([]); 
          const [hiddenColumns, setHiddenColumns] = useState([]); 
          const [pinnedColumns, setPinnedColumns] = useState([]); 
          
          const [currentDate, setCurrentDate] = useState(new Date());
          const [calendarView, setCalendarView] = useState('month');
          const [dashboardView, setDashboardView] = useState('subcontract'); 
          const [dashboardYear, setDashboardYear] = useState('overview'); 
          const [tasksSubTab, setTasksSubTab] = useState('subcontract'); 

          const [currentPage, setCurrentPage] = useState(1);
          const [rowsPerPage, setRowsPerPage] = useState(100);

          const [filterMonth, setFilterMonth] = useState('All');
          const [filterTeams, setFilterTeams] = useState([]);
          const [selectedStatuses, setSelectedStatuses] = useState([]);
          const [tableFilterTeams, setTableFilterTeams] = useState([]); 
          const [tableFilterCID, setTableFilterCID] = useState('All');
          const [tableFilterDate, setTableFilterDate] = useState([]);
          const [tableFilterYear, setTableFilterYear] = useState([]);
          const [tableFilterStatus, setTableFilterStatus] = useState([]);
          const [tableFilterOverdue, setTableFilterOverdue] = useState([]);
          const [searchTerm, setSearchTerm] = useState('');

          const [tooltipData, setTooltipData] = useState({ visible: false, task: null, x: 0, y: 0 });
          const [colWidths, setColWidths] = useState({}); 
          const [sortConfig, setSortConfig] = useState({ key: null, direction: null });
          const [editingCell, setEditingCell] = useState(null);

          const [historyLogs, setHistoryLogs] = useState([]);
          const [showHistoryModal, setShowHistoryModal] = useState(false);
          const [masterData, setMasterData] = useState(defaultMasterData);
          const [queueState, setQueueState] = useState({});
          
          const [isBackgroundSyncing, setIsBackgroundSyncing] = useState(false);
          const [isPendingTransition, startTransition] = useTransition();

          const [autoAssignData, setAutoAssignData] = useState(null);
          const [showDuplicatesOnly, setShowDuplicatesOnly] = useState(false);

          const pendingUpdatesRef = useRef([]);
          const syncTimerRef = useRef(null);
          const lastLocalEditRef = useRef(0);

          // 🔥 Custom Alerts & Confirms State
          const [appAlert, setAppAlert] = useState({ show: false, message: '', type: 'success' });
          const [appConfirm, setAppConfirm] = useState({ show: false, message: '', onConfirm: null });

          const customAlert = (message, type = 'success') => {
              setAppAlert({ show: true, message, type });
              setTimeout(() => setAppAlert({ show: false, message: '', type: 'success' }), 3500);
          };

          const customConfirm = (message, onConfirmCallback) => {
              setAppConfirm({ show: true, message, onConfirm: onConfirmCallback });
          };

          // ================== VARIABLES DEFINITIONS ==================
          const getStatusColumnName = (cols) => {
              if (!cols) return '';
              let exact = cols.find(c => {
                  const lc = c ? String(c).toLowerCase().replace(/[\s_]+/g, '') : '';
                  return lc === 'status' || lc === 'สถานะ' || lc === 'statusjob' || lc === 'jobstatus';
              });
              if (exact) return exact;
              let partial = cols.find(c => {
                  const lc = c ? String(c).toLowerCase().replace(/[\s_]+/g, '') : '';
                  return (lc.includes('status') || lc.includes('สถานะ')) && !lc.includes('change') && !lc.includes('เปลี่ยน') && !lc.includes('date') && !lc.includes('วันที่') && !lc.includes('time') && !lc.includes('เวลา');
              });
              if (partial) return partial;
              return cols[cols.length - 1] || '';
          };

          const getTeamColumnName = (cols) => {
              if (!cols) return '';

          // ================== FIREBASE FETCHING (Real-time 100%) ==================
          useEffect(() => {

                  if (snapshot.empty) return;
                  let allCols = new Set(initialCols);
                  let metadataCols = null;
                  let isSyncingStatus = false;
                  const newTasks = [];
                  const assignTasks = [];
                  const now = Date.now();

                  snapshot.forEach((doc) => {
                      if (doc.id === '_metadata') { metadataCols = doc.data().columns; return; }
                      if (doc.id === '_sync_status') {
                          const data = doc.data();
                          const ts = parseInt(data.timestamp?.integerValue) || 0;
                          if (data.status?.stringValue === 'syncing' && (now - ts < 15000)) {
                              isSyncingStatus = true;
                          }
                          return;
                      }

                      if (doc.id.startsWith('task_assign_')) {
                          const timestampStr = doc.id.replace('task_assign_', '');
                          const timestamp = parseInt(timestampStr);
                          if (!isNaN(timestamp) && (now - timestamp > 15000)) {
                              collectionRef.doc(doc.id).delete().catch(()=>{});
                              return; 
                          }
                      }

                      const data = doc.data();
                      const cleanData = { id: doc.id };
                      Object.keys(data).forEach(key => {
                          if (key !== '_rowIndex') {
                              let rawValue = typeof data[key] === 'object' && data[key] !== null && 'stringValue' in data[key] ? data[key].stringValue : data[key] ?? '';
                              cleanData[key] = formatSheetDate(rawValue);
                              allCols.add(key);
                          }
                      });
                      
                      let rIndex = 0;
                      if (data['_rowIndex'] && data['_rowIndex'].integerValue) rIndex = parseInt(data['_rowIndex'].integerValue);
                      else if (data['_rowIndex'] !== undefined) rIndex = parseInt(data['_rowIndex']);
                      else { const parsed = parseInt(doc.id.replace('task_', '').replace('task_assign_', '')); rIndex = isNaN(parsed) ? 999999 : parsed; }
                      
                      if (rIndex >= 50000 && !doc.id.startsWith('task_assign_')) {
                          console.warn('🗑️ Auto-purging stuck ghost task:', doc.id);
                          doc.ref.delete().catch(()=>{});
                          return;
                      }

                      cleanData._rowIndex = rIndex || 0;
                      if (doc.id.startsWith('task_assign_')) assignTasks.push(cleanData);
                      else newTasks.push(cleanData);
                  });

                  assignTasks.forEach(assignT => {
                      const isDuplicate = newTasks.some(realT => {
                          const keysToCompare = Object.keys(assignT).filter(k => k !== 'id' && k !== '_rowIndex' && assignT[k] && assignT[k] !== '-');
                          if (keysToCompare.length === 0) return false;
                          return keysToCompare.every(k => realT[k] === assignT[k]);
                      });
                      const timestamp = parseInt(assignT.id.replace('task_assign_', ''));
                      const isExpired = !isNaN(timestamp) && (now - timestamp > 15000);
                      if (isDuplicate || isExpired) collectionRef.doc(assignT.id).delete().catch(()=>{});
                      else newTasks.push(assignT);
                  });

                  const validTasks = newTasks.filter(isValidTaskHelper);
                  validTasks.sort((a, b) => parseInt(a._rowIndex) - parseInt(b._rowIndex));
                  
                  if (isSyncingStatus) {
                      // setIsBackgroundSyncing(true); // ปิดการตั้งค่านี้เพื่อไม่ให้จอกระพริบเวลาแก้ข้อมูล
                  } else {

              const unsubscribeNS = nsCollectionRef.onSnapshot((snapshot) => {

                  document.removeEventListener('touchmove', onPointerMove); 
                  document.removeEventListener('touchend', onPointerUp);

              }

                  const cCompCol = (currentColumnsTableLocal || []).find(c => ['บริษัท', 'ลูกค้า', 'site', 'องค์กร', 'ชื่อ', 'company'].some(kw => c ? String(c).toLowerCase().replace(/[\s_]+/g,'').includes(kw) : false)) || '';
                  historyRef.add({ taskId: docIds[0], company: taskObj[cCompCol] || 'Unknown', field: field, oldValue: oldValue || '', newValue: value, updatedAt: firebase.firestore.FieldValue.serverTimestamp(), groupSize: docIds.length }).catch(()=>{});
              } catch (err) {}

              try {
                  const batch = db.batch();
                  docIds.forEach(id => {
                      const ref = targetCollection.doc(id);
                      batch.update(ref, { [field]: value });
                  });
                  await batch.commit(); 
                  
                  if (GAS_WEB_APP_URL) {
                      let hasValidUpdate = false;

                      docIds.forEach((id, idx) => {
                          let rNum = rowIndices[idx];
                          if (!rNum || rNum === 999999 || rNum === 0 || isNaN(parseInt(rNum))) {
                             const parsedId = String(id).replace('task_', '').replace('NS_task_', '');
