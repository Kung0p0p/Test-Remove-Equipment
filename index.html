                                                                <p className="text-[10px] md:text-xs text-slate-400 font-semibold uppercase tracking-wider">ผู้ประสานงาน / เบอร์โทร</p>
                                                                <p className="text-slate-700 break-words font-medium mt-0.5">{contactVal}</p>
                                                                {phoneVal && contactVal !== phoneVal && <p className="text-slate-500 text-xs mt-0.5 break-words"><i className="fa-solid fa-phone text-[10px]"></i> {phoneVal}</p>}
                                                            </div>

                                                            {/* 4. วันและเวลาที่เข้าเก็บ */}
                                                            <div className="flex flex-col justify-center shrink-0">
                                                                <p className="text-[10px] md:text-xs text-slate-400 font-semibold uppercase tracking-wider">เข้าเก็บ (วัน-เวลา)</p>
                                                                <div className="flex items-center gap-2 mt-0.5 text-sm md:text-base font-bold text-slate-700">
                                                                    <p>{collectionDateVal}</p>
                                                                    {collectionTimeVal !== '-' && (
                                                                        <p><i className="fa-regular fa-clock mr-1 text-slate-500 text-sm"></i>{collectionTimeVal}</p>
                                                                    )}
                                                                </div>
                                                            </div>
                                                        </div>
                                                        
                                                    </div>

                                                    {/* 5. Status (อัปเดตจากปฏิทินได้) */}
                                                    <div className="flex justify-start lg:justify-end mt-2 lg:mt-0 shrink-0 border-t lg:border-t-0 lg:border-l border-slate-200 pt-3 lg:pt-0 lg:pl-4 relative">
                                                        <div style={{backgroundColor: softBg, color: bgColor, borderColor: bgColor}} className="font-bold px-4 md:px-6 py-1.5 md:py-2 rounded-lg md:rounded-xl border-2 text-center min-w-[120px] md:min-w-[140px] shadow-sm relative flex items-center justify-between cursor-pointer hover:opacity-80 transition-opacity">
                                                            <span className="flex-1 text-center">{t._calStatusCol ? t[t._calStatusCol] : 'ไม่มีสถานะ'}</span>
                                                            <i className="fa-solid fa-chevron-down text-[10px] ml-2"></i>
                                                            <select 
                                                                className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20" 
                                                                value="" 
                                                                onChange={async (e) => { 
                                                                    if (!e.target.value) return;
                                                                    const newVal = e.target.value;
                                                                    // 1. อัปเดตฝั่ง Subcontract (ตารางหลักของปฏิทิน)
                                                                    await handleCellChangeTable(t, t._calStatusCol, newVal, columns);
                                                                    
                                                                    // 2. 🔥 ถ้าเป็น "เก็บเรียบร้อย" หรือ "Complete" ให้หาและอัปเดตฝั่ง Region ด้วย
                                                                    const isDone = newVal.match(/(เก็บเรียบร้อย|complete|สำเร็จ|100%)/i);
                                                                    if (isDone) {
                                                                        const cidVal = t[t_cidCol] ? String(t[t_cidCol]).trim() : '';
                                                                        const nsStatusCol = getStatusColumnName(nsColumns);
                                                                        const nsCidCol = nsColumns.find(c => ['cid', 'circuitno'].some(kw => c ? String(c).toLowerCase().replace(/[\s_]+/g,'').includes(kw) : false));
                                                                        
                                                                        if (cidVal && nsStatusCol && nsCidCol) {
                                                                            const matchedNsTask = nsTasks.find(nt => String(nt[nsCidCol]).trim() === cidVal);
                                                                            if (matchedNsTask) {
                                                                                handleCellChangeTable(matchedNsTask, nsStatusCol, 'Complete', nsColumns);
                                                                                customAlert("อัปเดตสถานะสำเร็จทั้ง 2 ระบบ", "success");
                                                                            }
                                                                        }
                                                                    }
                                                                }}
                                                            >
                                                                <option value="" disabled></option>
                                                                {/* 🔥 ใช้สีขาวดำ และอิงตาม subcontractStatuses */}
                                                                {(subcontractStatuses && subcontractStatuses.length > 0 ? subcontractStatuses : tableUniqueStatuses || []).map(s => (
                                                                    <option key={s} value={s} className="text-black bg-white">{s}</option>
                                                                ))}
                                                            </select>
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* 6. หมายเหตุเพิ่มเติม */}
                                                {t._calNoteCol && t[t._calNoteCol] && (
                                                    <div className="mt-3 pt-3 border-t border-slate-100 w-full">
                                                        <p className="text-[10px] md:text-xs text-amber-600 font-semibold uppercase tracking-wider">หมายเหตุเพิ่มเติม</p>
                                                        <p className="text-slate-600 text-xs mt-0.5 break-words">{t[t._calNoteCol]}</p>
                                                    </div>
                                                )}
                                            </div>
                                          </div>
                                        )
                                    })}
                                  </div>
                                )}
                            </div>
                          </div>
                        );
                      })()}
                    </div>
                  </div>
                )}

                {/* --- 4. หน้า MASTER DATA --- */}
                {activeTab === 'master_data' && isAdmin && <MasterDataTab masterData={masterData} masterDataRef={masterDataRef} customAlert={customAlert} customConfirm={customConfirm} columns={columns} nsColumns={nsColumns} setMasterData={setMasterData} />}

                {/* --- 5. หน้า ASSIGN JOB --- */}
                {activeTab === 'assign' && <AssignJobTab masterData={masterData} queueState={queueState} setQueueState={setQueueState} masterDataRef={masterDataRef} collectionRef={collectionRef} GAS_WEB_APP_URL={GAS_WEB_APP_URL} nsTasks={nsTasks} autoAssignData={autoAssignData} clearAutoAssignData={clearAutoAssignData} customAlert={customAlert} setTasks={setTasks} />}

              </main>

              {/* Tooltip Component (Balanced Glassmorphism + Large Status) */}
              {tooltipData.visible && tooltipData.task && (() => {
                  const cidVal = tooltipData.task._calCidCol ? tooltipData.task[tooltipData.task._calCidCol] : tooltipData.task[t_getCol(['cid', 'circuitno'])] || '';
                  const statusVal = tooltipData.task._calStatusCol ? tooltipData.task[tooltipData.task._calStatusCol] : tooltipData.task[t_getCol(['status', 'สถานะ'])] || 'ไม่ระบุสถานะ';
                  const companyVal = tooltipData.task._calCompCol ? tooltipData.task[tooltipData.task._calCompCol] : tooltipData.task[t_getCol(['บริษัท', 'ลูกค้า', 'site', 'องค์กร', 'ชื่อ', 'company'])] || 'ไม่ระบุองค์กร';
                  
                  const statusText = getStatusColor(statusVal, 1);
                  const statusBg = getStatusColor(statusVal, 0.15);

                  return (
                    <div 
                        // 🔥 ปรับความใสให้อ่านง่าย (bg-white/90) และเบลอพอประมาณ
                        className="fixed z-[9999] bg-white/90 backdrop-blur-lg p-0 rounded-2xl shadow-[0_15px_45px_-10px_rgba(0,0,0,0.3)] border border-slate-200 w-[300px] md:w-[340px] pointer-events-none transition-all duration-200 flex flex-col ring-1 ring-black/5 overflow-hidden" 
                        style={{ left: tooltipData.x, top: tooltipData.y }}
                    >
                        {/* Header: สีคราม-ฟ้า (ไม่ใสเกินไป) + CID เด่น */}
                        <div className="bg-gradient-to-r from-slate-100 to-blue-50 p-4 shrink-0 border-b border-slate-200/60 shadow-sm">
                            <div className="flex justify-between items-start mb-2">
                                <div className="flex items-center gap-1.5">
                                    <div className="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
                                    <span className="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Detail Summary</span>
                                </div>
                                
                                {/* 🔥 Status: ขยายขนาดฟอนต์ให้ใหญ่ขึ้น (text-xs) */}
                                <div className="px-3 py-1 rounded-md text-xs font-black border shadow-sm bg-white/80" style={{ color: statusText, borderColor: statusText }}>
                                    {statusVal}
                                </div>
                            </div>
                            
                            <h4 className="font-bold text-slate-900 text-sm md:text-base break-words leading-tight">
                                {cidVal && cidVal !== '-' && (
                                    <span className="text-blue-700 font-black mr-2 bg-blue-100/50 px-1.5 py-0.5 rounded border border-blue-200/50">{cidVal}</span>
                                )}
                                {companyVal}
                            </h4>
                        </div>

                        {/* Body: ขยายตามเนื้อหา ไม่มี Scroll ซ้อน */}
                        <div className="p-4 space-y-3 text-[11px] md:text-xs text-slate-700 bg-white/40">
                            {(currentColumnsTable || []).map(col => {
                                if (skipColsInTooltip.includes(col) || 
                                    col === tooltipData.task._calCidCol || col === t_getCol(['cid', 'circuitno']) ||
                                    col === tooltipData.task._calStatusCol || col === t_getCol(['status', 'สถานะ'])) {
                                    return null;
                                }
                                
                                const val = tooltipData.task[col]; 
                                if (!val || String(val).trim() === '') return null;
                                
                                const isMultiLine = String(val).includes('\n');

                                return (
                                    <div key={col} className="flex flex-col relative pl-3 border-l-2 border-slate-300">
                                        <span className="font-bold text-[9px] text-slate-400 uppercase tracking-tight mb-0.5">
                                            {col}
                                        </span>
                                        <div className={`text-slate-800 font-semibold leading-relaxed ${isMultiLine ? 'whitespace-pre-wrap mt-1 bg-white/60 p-2 rounded-lg border border-slate-100 shadow-sm' : 'break-words'}`}>
                                            {val}
                                        </div>
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                  );
              })()}

              {/* History Modal */}
              {showHistoryModal && (
                  <div className="fixed inset-0 z-[1000] flex items-center justify-center bg-slate-900/60 p-4 animate-fade-in">
                      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[85vh] flex flex-col overflow-hidden">
                          <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50 shrink-0">
                              <h2 className="text-lg font-bold text-slate-800"><i className="fa-solid fa-clock-rotate-left text-indigo-600 mr-2"></i> ประวัติการแก้ไขข้อมูล (ล่าสุด 50 รายการ)</h2>
                              <button onClick={() => setShowHistoryModal(false)} className="w-8 h-8 flex justify-center items-center rounded-full bg-white hover:bg-slate-200 text-slate-500 shadow-sm border transition-colors"><i className="fa-solid fa-xmark"></i></button>
                          </div>
                          <div className="flex-1 overflow-y-auto p-4 bg-slate-100/50">
                              {(historyLogs || []).length === 0 ? (
                                  <div className="text-center py-10 text-slate-400"><i className="fa-regular fa-folder-open text-4xl mb-3"></i><p>ยังไม่มีประวัติการแก้ไขข้อมูล</p></div>
                              ) : (
                                  <div className="space-y-3">
                                      {(historyLogs || []).map(log => {
                                          const dateStr = log.updatedAt ? new Date(log.updatedAt.toDate()).toLocaleString('th-TH') : 'กำลังบันทึก...';
                                          return (
                                              <div key={log.id} className="bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex flex-col md:flex-row md:items-center gap-3">
                                                  <div className="w-full md:w-1/4 shrink-0 border-r border-slate-100">
                                                      <p className="text-[10px] text-slate-400 font-bold uppercase"><i className="fa-regular fa-clock"></i> {dateStr}</p>
                                                      <p className="text-xs font-bold text-slate-700 mt-1 line-clamp-1">{log.company}</p>
                                                  </div>
                                                  <div className="flex-1 flex flex-col sm:flex-row items-start sm:items-center gap-2 sm:gap-4 text-sm">
                                                      <span className="bg-slate-100 text-slate-600 px-2 py-1 rounded text-xs font-semibold shrink-0">คอลัมน์: {log.field}</span>
                                                      <div className="flex items-center gap-2 w-full">
                                                          <span className="line-through text-red-500 bg-red-50 px-2 py-0.5 rounded truncate max-w-[150px]" title={log.oldValue}>{log.oldValue || '-ว่าง-'}</span>
                                                          <i className="fa-solid fa-arrow-right-long text-slate-300 shrink-0"></i>
                                                          <span className="text-emerald-600 font-bold bg-emerald-50 px-2 py-0.5 rounded truncate flex-1" title={log.newValue}>{log.newValue || '-ว่าง-'}</span>
                                                      </div>
                                                  </div>
                                              </div>
                                          )
                                      })}
                                  </div>
                              )}
                          </div>
                      </div>
                  </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
